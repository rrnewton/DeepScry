<!DOCTYPE html>
<!--
WASM AI Test Harness

A minimal page for running WASM AI network games in a headless browser.
Used by the Python test infrastructure for equivalence testing.

URL parameters:
  server=ws://localhost:PORT  - Game server WebSocket URL
  controller=random|zero      - AI controller type (default: random)
  name=PlayerName             - Player display name (default: WasmAI)
  seed=N                      - RNG seed for AI decisions (default: 42)

Completion is signaled by:
  window.gameResult = { winner, choices, error }
  console.log('[WASM_DONE]') - indicates game finished

Poll window.gameResult via Playwright evaluate() for results.
-->
<html>
<head>
<meta charset="UTF-8">
<title>WASM AI Harness</title>
</head>
<body>
<pre id="log"></pre>
<script type="module">
import init, * as wasm from '/pkg/mtg_forge_rs.js';

// --- URL parameters ---
const params = new URLSearchParams(location.search);
const serverUrl  = params.get('server')     ?? 'ws://localhost:17771';
const controller = params.get('controller') ?? 'random';
const playerName = params.get('name')       ?? 'WasmAI';
const seed       = parseInt(params.get('seed') ?? '42', 10);

// --- State ---
let gameResult   = null;
let choiceCount  = 0;
let ws           = null;
let gameLoopRunning = false;

const logEl = document.getElementById('log');
function log(msg) {
    console.log(msg);
    logEl.textContent += msg + '\n';
}

// Expose result for Playwright polling
window.getGameResult = () => gameResult;
window.getChoiceCount = () => choiceCount;

log('[WASM_HARNESS] Parameters:');
log(`  server:     ${serverUrl}`);
log(`  controller: ${controller}`);
log(`  name:       ${playerName}`);
log(`  seed:       ${seed}`);

// --- WASM init ---
try {
    await init();
    log('[WASM_HARNESS] WASM initialized');
} catch (e) {
    log(`[WASM_HARNESS] WASM init failed: ${e}`);
    gameResult = { error: `wasm_init_failed: ${e}` };
    console.log('[WASM_DONE]');
    throw e;
}

// Verify network exports exist
if (typeof wasm.network_init !== 'function') {
    const msg = 'network_init not exported (need wasm-network feature)';
    log(`[WASM_HARNESS] ERROR: ${msg}`);
    gameResult = { error: msg };
    console.log('[WASM_DONE]');
    throw new Error(msg);
}

// --- Load card database (mtg-6fsjb per-set bins) ---
// sets/index.json maps every card name to its primary per-set bin file.
// For the AI test harness we eagerly load EVERY set bin in parallel so any
// late-bound deck-submission card name resolves immediately. The total
// wire size is comparable to the old single cards.bin.
let deckIndexList = [];
try {
    log('[WASM_HARNESS] Loading card database (per-set bins)...');
    const [decksData, setIndex] = await Promise.all([
        fetch('/data/decks.bin').then(r => r.arrayBuffer()),
        fetch('/data/sets/index.json').then(r => r.json()),
    ]);
    const cardDb = new wasm.WasmCardDatabase();
    cardDb.load_decks(new Uint8Array(decksData));

    await Promise.all(setIndex.sets.map(async s => {
        const r = await fetch(`/data/sets/${s.file}`);
        if (!r.ok) throw new Error(`Failed to fetch set ${s.file}: ${r.status}`);
        cardDb.load_set(new Uint8Array(await r.arrayBuffer()));
    }));

    // deckIndexList kept as a list of {name} so the rest of this harness
    // (and the fallback deck-submission builder) can iterate deck names.
    const deckNames = JSON.parse(cardDb.get_deck_names_json());
    deckIndexList = deckNames.map(name => ({ name }));

    // Store globally for fancy_tui to use
    window._wasmCardDb = cardDb;
    log(`[WASM_HARNESS] Card database loaded (${cardDb.card_count()} cards across ${setIndex.sets.length} set bins)`);
} catch (e) {
    log(`[WASM_HARNESS] ERROR loading card database: ${e}`);
    gameResult = { error: `card_db_load_failed: ${e}` };
    console.log('[WASM_DONE]');
    throw e;
}

// --- Build DeckSubmission JSON ---
// Tries to load deck_submission.json first (pre-generated by the test runner).
// Falls back to a minimal placeholder deck (for manual testing).
async function buildDeckJsonFallback() {
    if (deckIndexList.length === 0) throw new Error('No decks in index');
    // Return a minimal placeholder - the actual card composition doesn't matter
    // for AI testing because the server uses the late-binding CardID architecture.
    return JSON.stringify({ main_deck: [], sideboard: [] });
}

let deckJson;
try {
    // Use the pre-generated deck_submission.json (written by test runner from .dck file).
    // Falls back to a minimal placeholder for manual testing.
    deckJson = await fetch('/data/deck_submission.json')
        .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); })
        .then(d => JSON.stringify(d))
        .catch(async () => {
            log('[WASM_HARNESS] No deck_submission.json, using placeholder');
            return buildDeckJsonFallback();
        });
    log('[WASM_HARNESS] Deck JSON ready');
} catch (e) {
    log(`[WASM_HARNESS] ERROR building deck JSON: ${e}`);
    gameResult = { error: `deck_json_failed: ${e}` };
    console.log('[WASM_DONE]');
    throw e;
}

// --- Connect to server ---
log(`[WASM_HARNESS] Connecting to ${serverUrl}...`);

// Initialize network state in WASM
wasm.network_init(serverUrl, '', playerName, deckJson);

ws = new WebSocket(serverUrl);

// Poll interval to flush outbound messages and run game loop
let pollTimer = null;

function startPolling() {
    if (pollTimer) return;
    pollTimer = setInterval(() => {
        // Send all pending outbound messages
        while (wasm.network_has_outbound_messages()) {
            const msg = wasm.network_get_outbound_message();
            if (msg && ws.readyState === WebSocket.OPEN) {
                ws.send(msg);
            }
        }

        // Trigger game loop if game is in progress
        if (wasm.network_get_state() === 'in_game' && !gameLoopRunning) {
            runGameLoop();
        }

        // Check for game end
        if (wasm.network_get_state() === 'game_ended' && !gameResult) {
            const winner = wasm.network_get_winner?.() ?? null;
            gameResult = { winner, choices: choiceCount };
            log(`[WASM_HARNESS] Game ended! Winner: ${winner}, Choices: ${choiceCount}`);
            clearInterval(pollTimer);
            pollTimer = null;
            ws.close();
            console.log('[WASM_DONE]');
        }
    }, 50);  // 50ms poll - fast enough for responsive AI
}

ws.onopen = () => {
    log('[WASM_HARNESS] WebSocket connected');
    wasm.network_on_open();

    // Flush authentication message
    while (wasm.network_has_outbound_messages()) {
        const msg = wasm.network_get_outbound_message();
        if (msg) ws.send(msg);
    }

    startPolling();
};

ws.onmessage = (event) => {
    const processed = wasm.network_on_message(event.data);
    if (!processed) {
        log(`[WASM_HARNESS] WARN: Failed to process message: ${event.data.substring(0, 100)}`);
    }

    // Flush any outbound messages triggered by this inbound message
    while (wasm.network_has_outbound_messages()) {
        const msg = wasm.network_get_outbound_message();
        if (msg && ws.readyState === WebSocket.OPEN) {
            ws.send(msg);
        }
    }

    // Check for game_ended message
    try {
        const parsed = JSON.parse(event.data);
        if (parsed.type === 'game_ended') {
            // Handled by poll timer
        } else if (parsed.type === 'choice_request' || parsed.type === 'opponent_choice') {
            // Trigger game loop immediately
            if (!gameLoopRunning) {
                runGameLoop();
            }
        }
    } catch (_) {}
};

ws.onerror = (e) => {
    log(`[WASM_HARNESS] WebSocket error: ${e}`);
    wasm.network_on_error(`WebSocket error`);
    if (!gameResult) {
        gameResult = { error: 'websocket_error' };
        console.log('[WASM_DONE]');
    }
};

ws.onclose = () => {
    const netState = wasm.network_get_state?.() ?? 'unknown';
    log(`[WASM_HARNESS] WebSocket closed (network_state=${netState}, gameResult=${JSON.stringify(gameResult)})`);
    if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    if (!gameResult) {
        gameResult = { error: 'websocket_closed_early' };
        console.log('[WASM_DONE]');
    }
};

// --- Game loop runner ---
// Runs the WASM game loop until it needs more input (NeedInput) or completes
async function runGameLoop() {
    if (gameLoopRunning) return;
    gameLoopRunning = true;

    try {
        // run_network_mode_ai() runs the game loop until NeedInput
        // It returns: 'complete', 'need_input', or throws
        const result = wasm.run_network_ai_step(controller, seed);
        if (result !== 'need_input') {
            log(`[WASM_HARNESS] run_network_ai_step returned: ${result}, state=${wasm.network_get_state()}`);
        }
        if (result === 'complete') {
            if (!gameResult) {
                gameResult = { choices: choiceCount, completed: true };
                console.log('[WASM_DONE]');
            }
        } else if (result === 'choice_made') {
            choiceCount++;
        }
        // 'need_input' = waiting for server, poll timer will retry

        // Flush outbound messages after game loop
        while (wasm.network_has_outbound_messages()) {
            const msg = wasm.network_get_outbound_message();
            if (msg && ws.readyState === WebSocket.OPEN) {
                ws.send(msg);
            }
        }
    } catch (e) {
        log(`[WASM_HARNESS] Game loop error: ${e}`);
        if (!gameResult) {
            gameResult = { error: `game_loop_error: ${e}` };
            console.log('[WASM_DONE]');
        }
    } finally {
        gameLoopRunning = false;
    }
}

log('[WASM_HARNESS] Setup complete, waiting for server...');
</script>
</body>
</html>
