<!DOCTYPE html>
<!--
  launcher.html — the per-player pre-game launcher (mtg-35z3s lobby redo, page 2 of 4).

  The lobby (index.html) hands off here via:
    launcher.html?game=<name>&role=create|join&pass=<pw>&name=<user>&ws=<wsurl>
    [&allow_local_img_load=true][&reconnect_token=<tok>]

  This page lets ONE player pick, for THIS game:
    - their deck (grouped into deck COLLECTIONS, not a flat dropdown), with a
      "Deck Editor" launch button (deck_editor.html) for building custom decks;
    - their renderer: Native GUI (DEFAULT) or Web TUI (alternate) — a per-player
      experience detail chosen HERE, never on the lobby.

  On "Play" it redirects to the matching game page (native_game.html by default,
  tui_game.html if Web TUI is chosen), forwarding the FULL param contract:
    &deck=<name>&ui=native|tui plus the inherited game/role/pass/name/ws/...

  The deck-collections UX is lifted from tui_game.html's built-in launcher
  (DECK_COLLECTIONS + the collection→deck dropdown wiring), generalized to ONE
  player and made renderer-agnostic. The redirect itself reuses the shared
  buildRedirectUrl() in lobby_launcher.js so the role→lobby_create/lobby_join
  translation and param names live in exactly one place (DRY).

  This page is WASM-FREE: deck names come from data/sets/index.json's `deck_names`
  field (emitted by `mtg export-wasm` precisely so a deck picker can populate
  without loading WASM), exactly like deck_editor.html loads its catalog. Custom
  decks come from the shared `mtg-forge-custom-decks` localStorage key, the same
  key deck_editor.html / the game pages write to.
-->
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepScry &mdash; Launcher</title>
    <!-- Derives window.MTG_WS_URL for the waiting-room lobby socket (mtg-682). -->
    <script src="server-config.js"></script>
    <style>
        :root {
            --bg: #0a0a14; --surface: #16213e; --surface-2: #0f3460;
            --border: #1a2a50; --text: #e6e6f0; --muted: #8a8aa0;
            --accent: #4cc9f0; --gold: #ffd700;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 24px;
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            display: flex; align-items: flex-start; justify-content: center;
            min-height: 100vh;
        }
        .box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 28px 32px;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        }
        h1 { color: var(--gold); font-size: 24px; margin: 0 0 4px; }
        .subtitle { color: var(--muted); font-size: 13px; margin: 0 0 22px; }
        .subtitle b { color: var(--accent); font-family: monospace; }
        .field { margin-bottom: 20px; }
        .field > label.field-label {
            display: block; font-size: 11px; color: var(--muted);
            text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px;
        }
        select {
            width: 100%; padding: 8px 10px; font-size: 14px;
            background: var(--surface-2); color: var(--text);
            border: 1px solid var(--border); border-radius: 5px;
        }
        .deck-row { display: flex; gap: 8px; align-items: stretch; }
        .deck-row select { flex: 1; }
        .deck-editor-btn {
            white-space: nowrap; padding: 8px 14px; font-size: 13px; cursor: pointer;
            background: var(--surface-2); color: var(--accent);
            border: 1px solid var(--accent); border-radius: 5px;
            text-decoration: none; display: inline-flex; align-items: center;
        }
        .deck-editor-btn:hover { background: #16406b; }
        .deck-editor-btn.disabled { opacity: 0.45; cursor: not-allowed; pointer-events: none; }
        .renderer-toggle { display: flex; gap: 10px; }
        .renderer-opt {
            flex: 1; cursor: pointer; padding: 12px 14px; border-radius: 6px;
            background: var(--surface-2); border: 2px solid var(--border);
            display: flex; flex-direction: column; gap: 3px;
        }
        .renderer-opt input { margin: 0 6px 0 0; }
        .renderer-opt.selected { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
        .renderer-opt .ro-title { font-size: 14px; font-weight: 600; }
        .renderer-opt .ro-title .badge {
            font-size: 9px; color: var(--bg); background: var(--accent);
            border-radius: 3px; padding: 1px 5px; margin-left: 6px;
            text-transform: uppercase; letter-spacing: 0.5px; vertical-align: middle;
        }
        .renderer-opt .ro-desc { font-size: 11px; color: var(--muted); }
        .cb-row { display: flex; align-items: center; gap: 7px; font-size: 13px; margin: 4px 0; cursor: pointer; }
        .cb-row input { margin: 0; }
        .image-sources { margin: 6px 0 0 18px; padding-left: 10px; border-left: 2px solid var(--border); }
        .image-sources .cb-row { font-size: 12px; color: var(--muted); }
        .gate-note { font-size: 10px; color: var(--muted); margin-top: 4px; }
        .gate-note code { color: var(--accent); }
        .play-row { display: flex; align-items: center; gap: 14px; margin-top: 6px; }
        #btn-play {
            flex: 1; padding: 13px; font-size: 16px; font-weight: 700; cursor: pointer;
            background: linear-gradient(135deg, #2a9d4a, #1f7d3a); color: #fff;
            border: none; border-radius: 7px;
        }
        #btn-play:hover { filter: brightness(1.1); }
        #btn-play:disabled { background: #2a2a40; color: #666; cursor: not-allowed; filter: none; }
        .status { font-size: 12px; color: var(--muted); min-height: 1.2em; }
        .status.error { color: #ff8080; }
        .wr-conn { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
        .wr-conn.ok { color: var(--accent); }
        .wr-conn.err { color: #ff8080; }
        .wr-players { display: flex; flex-direction: column; gap: 6px; }
        .wr-player {
            display: flex; align-items: center; gap: 10px;
            padding: 8px 10px; border-radius: 6px;
            background: var(--surface-2); border: 1px solid var(--border);
            font-size: 13px;
        }
        .wr-player.ready { border-color: #2a9d4a; }
        .wr-role {
            font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px;
            color: var(--bg); background: var(--muted); border-radius: 3px;
            padding: 2px 6px;
        }
        .wr-player.ready .wr-role { background: #2a9d4a; }
        .wr-name { flex: 1; font-weight: 600; }
        .wr-name.empty { color: var(--muted); font-weight: 400; font-style: italic; }
        .wr-ready { font-size: 11px; color: var(--muted); }
        .wr-ready.is-ready { color: #4ade80; font-weight: 600; }
        .footer { margin-top: 22px; font-size: 12px; }
        .footer a { color: var(--accent); }
        .params-dump { margin-top: 14px; font-size: 11px; color: var(--muted); }
        .params-dump summary { cursor: pointer; }
        .params-dump dl { display: grid; grid-template-columns: auto 1fr; gap: 3px 12px; margin: 8px 0 0; }
        .params-dump dt { text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; }
        .params-dump dd { margin: 0; font-family: monospace; color: var(--gold); word-break: break-all; }
    </style>
</head>
<body>
<div class="box">
    <h1>Launcher</h1>
    <p class="subtitle" id="subtitle">Pre-game setup</p>

    <!-- Deck collection + deck picker (generalized from tui_game.html, one player) -->
    <div class="field">
        <label class="field-label" for="deck-collection">Deck Collection</label>
        <select id="deck-collection">
            <option value="old_school">Old School 1994</option>
            <option value="booster_draft">Booster Draft</option>
            <option value="commander">Commander</option>
            <option value="custom">Custom Decks (Local)</option>
        </select>
    </div>

    <div class="field">
        <label class="field-label" for="deck-select">Deck</label>
        <div class="deck-row">
            <select id="deck-select"></select>
            <!--
              Split Deck Editor (mtg-682): "New Deck" opens the editor blank;
              "Edit Deck" opens the CURRENTLY SELECTED deck for editing. Editing a
              premade saves a COPY as a custom deck (the editor never mutates a
              premade — see deck_editor.html ?edit=). #btn-deck-editor is kept as
              an alias of "New Deck" so existing references/tests still resolve.
            -->
            <a id="btn-deck-editor" class="deck-editor-btn" href="deck_editor.html" title="Open the Deck Editor with a blank deck">&#10010; New Deck</a>
            <a id="btn-edit-deck" class="deck-editor-btn" href="deck_editor.html" title="Edit the selected deck (saves a copy)">&#9998; Edit Deck</a>
        </div>
    </div>

    <!-- Renderer toggle: Native (DEFAULT) vs Web TUI -->
    <div class="field">
        <label class="field-label">Renderer</label>
        <div class="renderer-toggle" id="renderer-toggle">
            <label class="renderer-opt selected" id="renderer-opt-native">
                <span class="ro-title"><input type="radio" name="renderer" id="renderer-native" value="native" checked>Native GUI<span class="badge">Default</span></span>
                <span class="ro-desc">Card-style graphical board (native_game.html).</span>
            </label>
            <label class="renderer-opt" id="renderer-opt-tui">
                <span class="ro-title"><input type="radio" name="renderer" id="renderer-tui" value="tui">Web TUI</span>
                <span class="ro-desc">Terminal-style text renderer (tui_game.html).</span>
            </label>
        </div>
    </div>

    <!--
      Card-image + debug settings (mtg-ttjt6): re-homed from the OLD built-in
      game-page launcher (the lobby redo dropped these). They are per-game
      *display* prefs, chosen here pre-game and forwarded to the game page via
      &images / &img_src / &debug. The "Local" source is gated behind
      ?allow_local_img_load=true (sticky in sessionStorage) — licensing posture
      for serving card images from our VM is unsettled, so the default UX must
      offer only Scryfall/Gatherer until the URL param unlocks Local.
    -->
    <div class="field">
        <label class="field-label">Card Images</label>
        <label class="cb-row"><input type="checkbox" id="show-card-images" checked> Show card images</label>
        <div class="image-sources" id="image-source-options">
            <label class="cb-row" id="img-src-local-label"><input type="checkbox" id="img-src-local"> Local (fastest, offline)</label>
            <label class="cb-row"><input type="checkbox" id="img-src-scryfall" checked> Scryfall (high quality)</label>
            <label class="cb-row"><input type="checkbox" id="img-src-gatherer" checked> Gatherer (official)</label>
            <div id="img-src-local-gate-note" class="gate-note" style="display:none;">
                Local images hidden pending licensing clarity around card images.
                Append <code>?allow_local_img_load=true</code> to the URL to enable.
            </div>
        </div>
    </div>

    <div class="field">
        <label class="field-label">Diagnostics</label>
        <label class="cb-row"><input type="checkbox" id="debug-mode"> Debug logging (TRACE)</label>
    </div>

    <!--
      Waiting-room panel (mtg-682 Variant 1). The launcher holds a lobby
      WebSocket for the pre-game rendezvous: the creator CreateGames (so the
      game is LISTED for a 2nd browser) and the joiner JoinGames, both with
      waiting_room=true. WaitingRoomUpdate drives the live opponent + ready
      display below. When BOTH players SetReady, the server sends
      WaitingRoomReady and each client auto-navigates to its game page.
    -->
    <div class="field" id="waiting-room">
        <label class="field-label">Waiting Room</label>
        <div class="wr-conn" id="wr-conn">Connecting to server…</div>
        <div class="wr-players">
            <div class="wr-player" id="wr-creator">
                <span class="wr-role">Host</span>
                <span class="wr-name" id="wr-creator-name">—</span>
                <span class="wr-ready" id="wr-creator-ready">not ready</span>
            </div>
            <div class="wr-player" id="wr-joiner">
                <span class="wr-role">Opponent</span>
                <span class="wr-name" id="wr-joiner-name">waiting…</span>
                <span class="wr-ready" id="wr-joiner-ready">—</span>
            </div>
        </div>
    </div>

    <div class="field play-row">
        <button id="btn-play" type="button">Ready</button>
    </div>
    <p class="status" id="status"></p>

    <div class="footer">
        <a href="index.html">&larr; Back to Lobby</a>
    </div>

    <details class="params-dump">
        <summary>Lobby handoff params</summary>
        <dl id="params-dl"></dl>
    </details>
</div>

<script type="module">
import { buildRedirectUrl, IMAGE_SOURCE_IDS, forwardStickyParamsOnAnchor } from './lobby_launcher.js';

(function () {
    'use strict';

    // --- Parse and expose the lobby handoff params (preserved from placeholder). ---
    const qs = new URLSearchParams(window.location.search);
    const params = Object.fromEntries(qs.entries());
    // Expose globally for Playwright test assertions.
    window.__launcherParams = params;

    // ==================== CARD-IMAGE + DEBUG SETTINGS ====================
    // Re-homed from the OLD built-in game-page launcher (mtg-ttjt6). Persisted
    // in localStorage (the launcher is the durable home for these prefs now) and
    // forwarded to the game page as &images/&img_src/&debug.
    const SETTINGS_KEY = 'mtg-forge-launcher-settings';

    // Gate the "Local" image source behind ?allow_local_img_load=true. Sticky in
    // sessionStorage (survives same-tab nav, resets on tab close) — NOT
    // localStorage, so a stale flag can never silently re-enable Local weeks
    // later (the exact failure the gate prevents). The param is authoritative
    // WHEN PRESENT (so ?allow_local_img_load=false can turn it back off).
    function resolveLocalImageAllowed() {
        let allowed;
        if (qs.has('allow_local_img_load')) {
            allowed = qs.get('allow_local_img_load') === 'true';
            try { sessionStorage.setItem('allowLocalImgLoad', allowed ? 'true' : 'false'); } catch (e) { /* ignore */ }
        } else {
            let stored = null;
            try { stored = sessionStorage.getItem('allowLocalImgLoad'); } catch (e) { /* ignore */ }
            allowed = stored === 'true';
        }
        return allowed;
    }
    const allowLocalImgLoad = resolveLocalImageAllowed();

    const statusEl = document.getElementById('status');
    function setStatus(msg, isError) {
        statusEl.textContent = msg || '';
        statusEl.classList.toggle('error', !!isError);
    }

    // --- Render the param dump (debug/visibility). ---
    (function renderParamDump() {
        const fields = [
            ['game', 'Game'], ['role', 'Role'], ['pass', 'Passcode'],
            ['name', 'Player'], ['ws', 'Server'], ['reconnect_token', 'Reconnect Token'],
        ];
        const dl = document.getElementById('params-dl');
        let any = false;
        for (const [key, label] of fields) {
            const val = qs.get(key);
            if (!val) continue;
            any = true;
            const dt = document.createElement('dt'); dt.textContent = label;
            const dd = document.createElement('dd'); dd.textContent = val;
            dl.appendChild(dt); dl.appendChild(dd);
        }
        if (!any) {
            const dt = document.createElement('dt'); dt.textContent = 'note';
            const dd = document.createElement('dd');
            dd.textContent = '(no params — reached directly, not via lobby)';
            dl.appendChild(dt); dl.appendChild(dd);
        }
    })();

    // --- Subtitle reflecting the game/role. ---
    (function renderSubtitle() {
        const game = qs.get('game');
        const role = qs.get('role');
        const name = qs.get('name');
        const sub = document.getElementById('subtitle');
        if (game) {
            const verb = role === 'join' ? 'Joining' : 'Hosting';
            sub.innerHTML = `${verb} <b>${escapeHtml(game)}</b>` +
                (name ? ` as <b>${escapeHtml(name)}</b>` : '') +
                ' &mdash; pick your deck &amp; renderer.';
        } else {
            sub.textContent = 'Pre-game setup (opened directly, not via the lobby).';
        }
    })();

    function escapeHtml(s) {
        return String(s).replace(/[&<>"']/g, (c) => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
        }[c]));
    }

    // ==================== DECK COLLECTIONS ====================
    // Lifted from tui_game.html's built-in launcher and generalized to one
    // player. The filters partition the WASM-free `deck_names` list (from
    // data/sets/index.json) into named collections; 'custom' reads localStorage.
    const DECK_COLLECTIONS = {
        old_school: {
            name: 'Old School 1994',
            filter: (deckName) => deckName.includes('_') && (
                /^\d\d_/.test(deckName) ||
                deckName.includes('classic') ||
                deckName.includes('erhnam') ||
                deckName.includes('ponza') ||
                deckName.includes('stasis') ||
                deckName.includes('disco') ||
                deckName.includes('zoo') ||
                deckName.includes('monolith')
            ),
        },
        booster_draft: {
            name: 'Booster Draft',
            filter: (deckName) => deckName.includes('avatar') || deckName.includes('spiderman'),
        },
        commander: {
            name: 'Commander',
            filter: (deckName) => deckName.includes('chandra_tokens'),
        },
        custom: {
            name: 'Custom Decks (Local)',
            filter: () => false, // handled separately from localStorage
        },
    };

    // Shared with deck_editor.html / the game pages.
    const CUSTOM_DECKS_KEY = 'mtg-forge-custom-decks';
    // deck_editor.html writes this when "Use in Lobby" is pressed WITHOUT a
    // launcher context (legacy lobby path). The launcher consumes it as a deck
    // preselect fallback so that flow still lands on the saved deck (mtg-ttjt6).
    const LOBBY_PRESELECT_KEY = 'mtg_lobby_deck_preselect';

    // Built-in deck names, populated WASM-free from index.json.
    let allDeckNames = [];
    // Built-in deck CONTENTS keyed by deck name, also WASM-free from index.json's
    // `deck_contents` field. Each value is { main_deck: [[name,count],...],
    // sideboard: [...] } — the exact DeckSubmission wire shape (mtg-682). This is
    // what lets the launcher CreateGame/JoinGame a real, valid deck without WASM.
    let allDeckContents = {};

    function getCustomDecks() {
        try {
            const saved = localStorage.getItem(CUSTOM_DECKS_KEY);
            return saved ? JSON.parse(saved) : {};
        } catch (e) {
            console.warn('Failed to load custom decks:', e);
            return {};
        }
    }

    const collectionSelect = document.getElementById('deck-collection');
    const deckSelect = document.getElementById('deck-select');
    const playBtn = document.getElementById('btn-play');

    /** Populate the deck dropdown from the selected collection. */
    function updateDeckDropdown() {
        const collection = collectionSelect.value;
        deckSelect.innerHTML = '';

        if (collection === 'custom') {
            const customDecks = getCustomDecks();
            const names = Object.keys(customDecks).sort();
            if (names.length === 0) {
                deckSelect.appendChild(new Option('(No custom decks — use the Deck Editor)', ''));
            } else {
                for (const name of names) {
                    const deck = customDecks[name];
                    const count = (deck.main_deck || []).reduce((sum, pair) => sum + (pair[1] || 0), 0);
                    deckSelect.appendChild(new Option(`${name} (${count} cards)`, name));
                }
            }
        } else {
            const cfg = DECK_COLLECTIONS[collection];
            if (!cfg) {
                collectionSelect.value = 'booster_draft';
                updateDeckDropdown();
                return;
            }
            const matching = allDeckNames.filter(cfg.filter);
            if (matching.length === 0) {
                deckSelect.appendChild(new Option('(No decks in this collection)', ''));
            } else {
                for (const name of matching) {
                    deckSelect.appendChild(new Option(name, name));
                }
            }
        }
        refreshPlayEnabled();
    }

    const editDeckBtn = document.getElementById('btn-edit-deck');
    const newDeckBtn = document.getElementById('btn-deck-editor');

    function refreshPlayEnabled() {
        // The Play/Ready button's enabled state is owned by the waiting-room
        // ready logic (refreshReadyButton, defined later — needs a valid 40+
        // card deck). Here we only keep the Edit-Deck link in sync. Guard for
        // the brief window before refreshReadyButton exists in the call graph.
        refreshEditDeckLink();
        if (typeof refreshReadyButton === 'function') refreshReadyButton();
    }

    /**
     * The launcher's own context (the lobby handoff params + the current
     * renderer/collection picks), so the deck editor can return HERE with the
     * pre-game state intact (mtg-ttjt6 "Back to Launcher"). The editor echoes
     * these back verbatim via `from=launcher`; selecting a deck there returns to
     * launcher.html?...&collection=custom&deck=<saved-name>.
     */
    function launcherContextParams() {
        const ctx = new URLSearchParams();
        ctx.set('from', 'launcher');
        for (const k of ['game', 'role', 'pass', 'name', 'ws', 'reconnect_token']) {
            const v = qs.get(k);
            if (v) ctx.set(k, v);
        }
        if (allowLocalImgLoad) ctx.set('allow_local_img_load', 'true');
        ctx.set('renderer', selectedRenderer());
        ctx.set('collection', collectionSelect.value);
        if (deckSelect.value) ctx.set('deck', deckSelect.value);
        return ctx;
    }

    /** Point "New Deck" at a blank editor, carrying the launcher context. */
    function refreshNewDeckLink() {
        const ctx = launcherContextParams();
        ctx.delete('deck'); // blank editor — no deck to preselect
        newDeckBtn.href = 'deck_editor.html?' + ctx.toString();
    }

    /**
     * Point "Edit Deck" at deck_editor.html?edit=<name>&source=<custom|premade>.
     * The editor loads that deck and, for a premade source, forces a save-as-copy
     * so the premade is never mutated. Disabled (no selectable deck) → blank New.
     * Carries the launcher context so the editor offers "Back to Launcher".
     */
    function refreshEditDeckLink() {
        refreshNewDeckLink();
        const name = deckSelect.value;
        if (!name) {
            editDeckBtn.classList.add('disabled');
            editDeckBtn.removeAttribute('href');
            editDeckBtn.title = 'Select a deck to edit';
            return;
        }
        const source = collectionSelect.value === 'custom' ? 'custom' : 'premade';
        const qp2 = launcherContextParams();
        qp2.set('edit', name);
        qp2.set('source', source);
        editDeckBtn.href = 'deck_editor.html?' + qp2.toString();
        editDeckBtn.classList.remove('disabled');
        editDeckBtn.title = source === 'premade'
            ? `Edit "${name}" (saves a COPY — premade is never changed)`
            : `Edit custom deck "${name}"`;
    }

    collectionSelect.addEventListener('change', updateDeckDropdown);
    deckSelect.addEventListener('change', refreshPlayEnabled);

    /** Load the built-in deck names WASM-free (same source deck_editor uses). */
    async function loadDeckNames() {
        try {
            const r = await fetch('./data/sets/index.json', { cache: 'no-store' });
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const idx = await r.json();
            allDeckNames = Array.isArray(idx.deck_names) ? idx.deck_names.slice() : [];
            allDeckNames.sort();
            allDeckContents = (idx.deck_contents && typeof idx.deck_contents === 'object')
                ? idx.deck_contents : {};
        } catch (err) {
            console.warn('Could not load deck list from index.json:', err);
            allDeckNames = [];
            setStatus('Could not load the built-in deck list (run `make wasm-export`). ' +
                'Custom decks still work.', true);
        }
        // Restore the collection/deck the user left with when returning FROM the
        // deck editor (?collection=&deck=, mtg-ttjt6 Back-to-Launcher round trip);
        // otherwise default to a populated built-in collection so a deck is
        // preselected.
        // A ?deck= (Back-to-Launcher round trip) wins; else a one-shot localStorage
        // preselect from deck_editor's legacy "Use in Lobby" path.
        let wantDeck = qs.get('deck');
        let wantCollection = qs.get('collection');
        if (!wantDeck) {
            try {
                const pre = localStorage.getItem(LOBBY_PRESELECT_KEY);
                if (pre) {
                    wantDeck = pre;
                    wantCollection = wantCollection || 'custom';
                    localStorage.removeItem(LOBBY_PRESELECT_KEY); // one-shot
                }
            } catch (e) { /* ignore */ }
        }
        if (wantCollection && DECK_COLLECTIONS[wantCollection]) {
            collectionSelect.value = wantCollection;
        } else {
            for (const key of ['booster_draft', 'old_school', 'commander']) {
                if (allDeckNames.some(DECK_COLLECTIONS[key].filter)) {
                    collectionSelect.value = key;
                    break;
                }
            }
        }
        updateDeckDropdown();
        if (wantDeck && Array.from(deckSelect.options).some((o) => o.value === wantDeck)) {
            deckSelect.value = wantDeck;
            refreshPlayEnabled();
        }
    }

    // ==================== RENDERER TOGGLE ====================
    // Native is the DEFAULT (radio `checked` in markup). Keep the visual
    // 'selected' class in sync so the default is obvious.
    const optNative = document.getElementById('renderer-opt-native');
    const optTui = document.getElementById('renderer-opt-tui');
    const radioNative = document.getElementById('renderer-native');
    const radioTui = document.getElementById('renderer-tui');

    function refreshRendererUI() {
        const native = radioNative.checked;
        optNative.classList.toggle('selected', native);
        optTui.classList.toggle('selected', !native);
    }
    radioNative.addEventListener('change', refreshRendererUI);
    radioTui.addEventListener('change', refreshRendererUI);
    refreshRendererUI();

    function selectedRenderer() {
        return radioTui.checked ? 'tui' : 'native';
    }

    // ==================== IMAGE-SOURCE PICKER + GATE ====================
    const showImagesCb = document.getElementById('show-card-images');
    const imgSrcLocalCb = document.getElementById('img-src-local');
    const imgSrcScryfallCb = document.getElementById('img-src-scryfall');
    const imgSrcGathererCb = document.getElementById('img-src-gatherer');
    const debugCb = document.getElementById('debug-mode');
    const imageSourceOptions = document.getElementById('image-source-options');

    // Apply the Local-image gate: when not allowed, force the Local checkbox off,
    // remove its label, and reveal the explanatory note. Mirrors the old
    // launcher's applyLocalImageGate (mtg-p5tyf / mtg-477).
    function applyLocalImageGate() {
        if (allowLocalImgLoad) {
            if (imgSrcLocalCb) imgSrcLocalCb.checked = true;
            return;
        }
        if (imgSrcLocalCb) imgSrcLocalCb.checked = false;
        const localLabel = document.getElementById('img-src-local-label');
        if (localLabel) localLabel.remove();
        const note = document.getElementById('img-src-local-gate-note');
        if (note) note.style.display = 'block';
    }

    /** The checked image sources, in canonical fallback order. */
    function selectedImageSources() {
        const checked = {
            local: imgSrcLocalCb && imgSrcLocalCb.checked,
            scryfall: imgSrcScryfallCb.checked,
            gatherer: imgSrcGathererCb.checked,
        };
        return IMAGE_SOURCE_IDS.filter((id) => checked[id]);
    }

    /** Enable/disable the source sub-options to track the master toggle. */
    function refreshImageSourceUI() {
        const on = showImagesCb.checked;
        imageSourceOptions.style.opacity = on ? '1' : '0.45';
        for (const cb of [imgSrcLocalCb, imgSrcScryfallCb, imgSrcGathererCb]) {
            if (cb) cb.disabled = !on;
        }
    }

    // ==================== SETTINGS PERSISTENCE ====================
    function saveSettings() {
        try {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify({
                renderer: selectedRenderer(),
                showImages: showImagesCb.checked,
                imgSrcLocal: !!(imgSrcLocalCb && imgSrcLocalCb.checked),
                imgSrcScryfall: imgSrcScryfallCb.checked,
                imgSrcGatherer: imgSrcGathererCb.checked,
                debug: debugCb.checked,
            }));
        } catch (e) { /* ignore */ }
    }

    function restoreSettings() {
        let s;
        try {
            const raw = localStorage.getItem(SETTINGS_KEY);
            if (!raw) return;
            s = JSON.parse(raw);
        } catch (e) { return; }
        if (s.renderer === 'tui') { radioTui.checked = true; refreshRendererUI(); }
        if (s.showImages !== undefined) showImagesCb.checked = s.showImages;
        // The gate may have removed the Local checkbox; ignore a stale stored
        // "local on" in that case (applyLocalImageGate ran first).
        if (s.imgSrcLocal !== undefined && imgSrcLocalCb && allowLocalImgLoad) {
            imgSrcLocalCb.checked = s.imgSrcLocal;
        }
        if (s.imgSrcScryfall !== undefined) imgSrcScryfallCb.checked = s.imgSrcScryfall;
        if (s.imgSrcGatherer !== undefined) imgSrcGathererCb.checked = s.imgSrcGatherer;
        if (s.debug !== undefined) debugCb.checked = s.debug;
    }

    // Gate FIRST (may remove the Local checkbox), then restore prefs, then UI.
    applyLocalImageGate();
    restoreSettings();
    // A ?renderer= from the deck-editor Back-to-Launcher round trip overrides the
    // localStorage default so the user returns to the renderer they had picked.
    const wantRenderer = qs.get('renderer');
    if (wantRenderer === 'tui') { radioTui.checked = true; refreshRendererUI(); }
    else if (wantRenderer === 'native') { radioNative.checked = true; refreshRendererUI(); }
    refreshImageSourceUI();

    for (const el of [showImagesCb, imgSrcScryfallCb, imgSrcGathererCb, debugCb, radioNative, radioTui]) {
        if (el) el.addEventListener('change', saveSettings);
    }
    if (imgSrcLocalCb) imgSrcLocalCb.addEventListener('change', saveSettings);
    showImagesCb.addEventListener('change', refreshImageSourceUI);

    // Keep the lobby/deck-editor links carrying the session's sticky params
    // (allow_local_img_load, debug, images, img_src, name, ws) so the unlock and
    // prefs survive a back-to-lobby hop.
    forwardStickyParamsOnAnchor(document.querySelector('.footer a'), qs);

    // ==================== GAME-PAGE NAVIGATION ====================
    // Build the game-page redirect URL from the current picks + handoff params.
    // Shared by the auto-start (WaitingRoomReady) path. Reuses buildRedirectUrl
    // so the role→lobby_create/lobby_join translation + param names live in one
    // place (DRY); the game page then opens its OWN durable game WebSocket and
    // performs the real CreateGame/JoinGame that drives the game.
    /** Build the game-page redirect URL string WITHOUT navigating. Exposed for
     *  Playwright assertions of the forwarded per-game prefs (mtg-ttjt6/682). */
    function buildGamePageUrl() {
        const deckName = deckSelect.value;
        const gameName = qs.get('game') || '';
        const ui = selectedRenderer();
        const role = qs.get('role') === 'join' ? 'join' : 'create';
        const gamePass = qs.get('pass') || '';
        const playerName = qs.get('name') || '';
        const wsUrl = qs.get('ws') || '';
        const baseUrl = buildRedirectUrl({
            action: role,
            gameName,
            gamePass,
            deckName,
            playerName,
            wsUrl,
            allowLocalImgLoad,
            reconnectToken: qs.get('reconnect_token') || '',
            ui,
            mode: 'network',
            showImages: showImagesCb.checked,
            imageSources: selectedImageSources(),
            debug: debugCb.checked,
        });
        const url = new URL(baseUrl, window.location.href);
        url.searchParams.set('game', gameName);
        url.searchParams.set('role', role);
        if (gamePass) url.searchParams.set('pass', gamePass);
        return url.pathname.split('/').pop() + url.search;
    }
    window.__buildGamePageUrl = buildGamePageUrl;

    function navigateToGamePage() {
        const ui = selectedRenderer();
        setStatus(`Starting ${ui === 'native' ? 'Native GUI' : 'Web TUI'}…`);
        window.location.href = buildGamePageUrl();
    }

    // ==================== WAITING ROOM (Variant 1, mtg-682) ====================
    // The launcher holds a lobby WebSocket for the pre-game rendezvous. On entry
    // it CreateGames (creator) or JoinGames (joiner) with waiting_room=true and a
    // REAL deck submission, so the slot is LISTED for a 2nd browser. Both players
    // SetReady; when both are ready the server sends WaitingRoomReady and each
    // client navigates to its game page (no extra click). Ready REQUIRES a valid
    // deck and AUTO-RESETS on deck/renderer change. This is all pre-game state —
    // no game RNG / no controller decisions — so determinism is preserved.

    const role = qs.get('role') === 'join' ? 'join' : 'create';
    const isCreator = role === 'create';
    const gameName = qs.get('game') || '';
    const playerName = qs.get('name') || '';
    const lobbyWsUrl = qs.get('ws') || window.MTG_WS_URL;

    // Make the host-side button intent explicit (spec: creator button label).
    playBtn.textContent = isCreator ? 'Ready — start on P2 join' : 'Ready';

    const connEl = document.getElementById('wr-conn');
    const creatorNameEl = document.getElementById('wr-creator-name');
    const creatorReadyEl = document.getElementById('wr-creator-ready');
    const joinerNameEl = document.getElementById('wr-joiner-name');
    const joinerReadyEl = document.getElementById('wr-joiner-ready');
    const creatorRowEl = document.getElementById('wr-creator');
    const joinerRowEl = document.getElementById('wr-joiner');

    let lobbyWs = null;
    let wsRegistered = false;
    let createdOrJoined = false;
    // True once WE (this client) have sent SetReady{true} and not yet un-readied.
    let weAreReady = false;
    // Expose for Playwright assertions.
    window.__launcherWaiting = { connected: false, ready: false, lastUpdate: null, started: false };

    function setConn(text, cls) {
        connEl.textContent = text;
        connEl.className = 'wr-conn' + (cls ? ' ' + cls : '');
    }

    /** Build a DeckSubmission { main_deck, sideboard } for the selected deck,
     *  WASM-free. Built-in decks come from index.json's deck_contents; custom
     *  decks from the shared localStorage key. Returns null if unavailable. */
    function buildDeckSubmission() {
        const name = deckSelect.value;
        if (!name) return null;
        if (collectionSelect.value === 'custom') {
            const decks = getCustomDecks();
            const d = decks[name];
            if (!d || !Array.isArray(d.main_deck)) return null;
            return { main_deck: d.main_deck, sideboard: Array.isArray(d.sideboard) ? d.sideboard : [] };
        }
        const c = allDeckContents[name];
        if (!c || !Array.isArray(c.main_deck)) return null;
        return { main_deck: c.main_deck, sideboard: Array.isArray(c.sideboard) ? c.sideboard : [] };
    }

    /** Total main-deck card count of the current selection (for the >=40 gate). */
    function selectedDeckSize() {
        const sub = buildDeckSubmission();
        if (!sub) return 0;
        return sub.main_deck.reduce((sum, pair) => sum + (pair[1] || 0), 0);
    }

    function wsSend(obj) {
        if (!lobbyWs || lobbyWs.readyState !== WebSocket.OPEN) return false;
        lobbyWs.send(JSON.stringify(obj));
        return true;
    }

    /** Render a WaitingRoomUpdate snapshot into the panel. */
    function renderWaitingRoom(creator, joiner) {
        window.__launcherWaiting.lastUpdate = { creator, joiner };
        if (creator) {
            creatorNameEl.textContent = creator.name || 'Host';
            creatorNameEl.classList.remove('empty');
            creatorReadyEl.textContent = creator.ready ? 'ready' : 'not ready';
            creatorReadyEl.classList.toggle('is-ready', !!creator.ready);
            creatorRowEl.classList.toggle('ready', !!creator.ready);
        }
        if (joiner) {
            joinerNameEl.textContent = joiner.name || 'Opponent';
            joinerNameEl.classList.remove('empty');
            joinerReadyEl.textContent = joiner.ready ? 'ready' : 'not ready';
            joinerReadyEl.classList.toggle('is-ready', !!joiner.ready);
            joinerRowEl.classList.toggle('ready', !!joiner.ready);
            setConn('Opponent joined.', 'ok');
        } else {
            joinerNameEl.textContent = 'waiting for opponent…';
            joinerNameEl.classList.add('empty');
            joinerReadyEl.textContent = '—';
            joinerReadyEl.classList.remove('is-ready');
            joinerRowEl.classList.remove('ready');
            setConn(isCreator ? 'Game listed — waiting for an opponent to join.' : 'Joining…', 'ok');
        }
    }

    /** Send the initial CreateGame (creator) or JoinGame (joiner) with a real
     *  deck so the slot is listed/joined. Called once the deck list is loaded. */
    function sendCreateOrJoin() {
        if (createdOrJoined) return;
        const deck = buildDeckSubmission();
        if (!deck) {
            setStatus('Could not load the selected deck. Pick another deck.', true);
            return;
        }
        createdOrJoined = true;
        const gamePass = qs.get('pass') || '';
        if (isCreator) {
            wsSend({
                type: 'create_game',
                password: '',
                game_name: gameName,
                game_password: gamePass || null,
                player_name: playerName || null,
                deck,
                waiting_room: true,
            });
        } else {
            wsSend({
                type: 'join_game',
                password: '',
                game_name: gameName,
                game_password: gamePass || null,
                player_name: playerName || null,
                deck,
                waiting_room: true,
            });
        }
    }

    function handleLobbyMessage(msg) {
        switch (msg.type) {
        case 'register_result':
            if (msg.success) {
                wsRegistered = true;
                sendCreateOrJoin();
            } else {
                // Name already held (e.g. our own lobby tab still connected).
                // Proceed without a reserved name — CreateGame/JoinGame still
                // carry our display name as a field.
                wsRegistered = true;
                sendCreateOrJoin();
            }
            break;
        case 'game_created':
            setConn('Game listed — waiting for an opponent to join.', 'ok');
            renderWaitingRoom({ name: playerName || 'Host', ready: false }, null);
            break;
        case 'waiting_room_update':
            renderWaitingRoom(msg.creator, msg.joiner);
            break;
        case 'waiting_room_ready':
            // Both players ready — auto-navigate to the game page (no click).
            // The game page opens its OWN game WebSocket and performs the real
            // CreateGame (creator) / JoinGame (joiner). Stagger the joiner's
            // navigation slightly so the creator's game page re-creates the slot
            // first, avoiding a JoinGame-before-Create race (both clients receive
            // WaitingRoomReady at nearly the same instant).
            window.__launcherWaiting.started = true;
            setStatus('Both players ready — starting game…');
            setConn('Both ready — starting…', 'ok');
            try { lobbyWs.close(1000, 'waiting-room-ready'); } catch (e) { /* ignore */ }
            if (msg.is_creator) {
                navigateToGamePage();
            } else {
                setTimeout(navigateToGamePage, 400);
            }
            break;
        case 'join_failed':
            setStatus('Could not join: ' + (msg.reason && (msg.reason.detail || JSON.stringify(msg.reason)) || 'unavailable'), true);
            setConn('Join failed.', 'err');
            break;
        case 'server_full':
            setStatus(msg.reason || 'Server is full, try again later.', true);
            setConn('Server full.', 'err');
            break;
        case 'error':
            // Non-fatal server errors (e.g. "Cannot ready without a deck").
            setStatus(msg.message || 'Server error', true);
            if (msg.message && /ready/i.test(msg.message)) {
                // Our ready was rejected — reflect un-ready in the UI.
                weAreReady = false;
                window.__launcherWaiting.ready = false;
                refreshReadyButton();
            }
            break;
        default:
            break;
        }
    }

    function connectLobby() {
        if (!gameName) {
            setConn('Opened directly (no game) — nothing to wait for.', '');
            setStatus('Open this page from the lobby to host or join a game.', true);
            playBtn.disabled = true;
            return;
        }
        setConn('Connecting to server…');
        try {
            lobbyWs = new WebSocket(lobbyWsUrl);
        } catch (e) {
            setConn('Cannot open WebSocket: ' + e.message, 'err');
            return;
        }
        lobbyWs.onopen = () => {
            window.__launcherWaiting.connected = true;
            setConn('Connected — registering…', 'ok');
            // Register a name (best-effort); CreateGame/JoinGame fire on the
            // register result. A blank name skips registration.
            if (playerName) {
                wsSend({ type: 'register', password: '', player_name: playerName });
            } else {
                wsRegistered = true;
                sendCreateOrJoin();
            }
        };
        lobbyWs.onmessage = (ev) => {
            let msg;
            try { msg = JSON.parse(ev.data); } catch (e) { return; }
            handleLobbyMessage(msg);
        };
        lobbyWs.onerror = () => {
            setConn('Connection error', 'err');
        };
        lobbyWs.onclose = () => {
            window.__launcherWaiting.connected = false;
            // If the game already started we navigated away; otherwise show the
            // disconnect (the slot is freed server-side on creator/joiner drop).
            if (!window.__launcherWaiting.started) {
                setConn('Disconnected from server.', 'err');
            }
        };
    }

    // ==================== READY HANDSHAKE ====================
    function refreshReadyButton() {
        const haveDeck = selectedDeckSize() >= 40;
        // Can only ready with a valid deck; the button toggles ready/un-ready.
        playBtn.disabled = !haveDeck && !weAreReady;
        playBtn.textContent = weAreReady
            ? 'Cancel ready'
            : (isCreator ? 'Ready — start on P2 join' : 'Ready');
    }

    /** Push the current deck to the server (SetDeck) so the opponent sees it and
     *  the server resets our ready flag. Called on deck change after create/join. */
    function pushDeck() {
        if (!createdOrJoined) return;
        const deck = buildDeckSubmission();
        if (!deck) return;
        wsSend({ type: 'set_deck', deck });
    }

    /** Reset our ready state (e.g. after a deck/renderer change) and tell the
     *  server. Mirrors the server's "deck change resets ready" rule for renderer
     *  changes too (renderer is a config change the opponent should re-confirm). */
    function autoUnready(reason) {
        if (!weAreReady) return;
        weAreReady = false;
        window.__launcherWaiting.ready = false;
        wsSend({ type: 'set_ready', ready: false });
        refreshReadyButton();
        setStatus(reason ? `Ready cleared — ${reason}.` : 'Ready cleared.');
    }

    playBtn.addEventListener('click', () => {
        if (!createdOrJoined) {
            setStatus('Still connecting…', true);
            return;
        }
        if (weAreReady) {
            // Toggle OFF.
            autoUnready('');
            return;
        }
        if (selectedDeckSize() < 40) {
            setStatus('Pick a valid deck (40+ cards) before readying.', true);
            return;
        }
        weAreReady = true;
        window.__launcherWaiting.ready = true;
        // Ensure the server has our latest deck on record, then ready up.
        pushDeck();
        wsSend({ type: 'set_ready', ready: true });
        refreshReadyButton();
        setStatus(isCreator
            ? 'Ready — the game auto-starts when your opponent is also ready.'
            : 'Ready — waiting for the host.');
    });

    // Deck change → push the new deck (server resets ready) + clear our ready.
    deckSelect.addEventListener('change', () => {
        autoUnready('deck changed');
        pushDeck();
        refreshReadyButton();
    });
    collectionSelect.addEventListener('change', () => {
        autoUnready('collection changed');
        refreshReadyButton();
    });
    // Renderer change → clear ready (config change the opponent should re-see).
    for (const r of [radioNative, radioTui]) {
        r.addEventListener('change', () => { autoUnready('renderer changed'); });
    }

    // Kick off deck loading, THEN connect the lobby socket (create/join needs a
    // resolved deck). loadDeckNames resolves the dropdown; connect afterwards.
    loadDeckNames().then(() => {
        refreshReadyButton();
        connectLobby();
    });
})();
</script>
</body>
</html>
