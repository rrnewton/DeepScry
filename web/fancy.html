<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Forge - Fancy TUI (WASM)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px 20px;
            background: #16213e;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .header h1 {
            color: #ffd700;
            font-size: 20px;
            margin: 0;
        }
        .header a {
            color: #4cc9f0;
            text-decoration: none;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .setup-bar {
            padding: 10px 20px;
            background: #0f3460;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .setup-bar label {
            color: #888;
            font-size: 12px;
        }
        .setup-bar select {
            background: #16213e;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        .setup-bar button {
            background: #4361ee;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .setup-bar button:hover {
            background: #3a0ca3;
        }
        .setup-bar button:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .help-text {
            color: #888;
            font-size: 12px;
            margin-left: auto;
        }
        .tui-container {
            flex: 1;
            display: flex;
            justify-content: stretch;
            align-items: stretch;
            padding: 0;
            background: #000;
            overflow: hidden;
            /* When header is hidden, take full viewport */
            min-height: 0;
        }
        /* RatZilla renders terminal content here
           RatZilla hardcodes: cols = innerWidth/10, rows = innerHeight/20
           Font 16px with 20px line-height matches RatZilla's 10x20 cell assumption.
           TIP: Use browser zoom (Ctrl+/-) to get more/fewer rows and columns! */
        #ratzilla-terminal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 16px;
            line-height: 20px;
            background: #000;
            overflow: hidden;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .error {
            background: #4a1010;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }
        #status {
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header" id="header-bar">
        <h1>MTG Forge - Fancy TUI</h1>
        <a href="index.html">Back to simple view</a>
        <span id="status">Loading...</span>
    </div>
    <!-- Floating game controls - collapsible widget in corner -->
    <div id="game-controls" style="display: none; position: fixed; top: 10px; right: 10px; z-index: 100;">
        <!-- Collapsed state: small toggle button -->
        <button id="btn-toggle-controls" style="background: rgba(22, 33, 62, 0.9); color: #ffd700; border: 1px solid #4361ee; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px;" title="Toggle Controls (C)">
            <span id="toggle-icon">&#9776;</span> <span id="turn-info-mini">T1</span>
        </button>
        <!-- Expanded controls panel -->
        <div id="controls-panel" style="display: none; margin-top: 5px; background: rgba(22, 33, 62, 0.95); padding: 10px; border-radius: 8px; border: 1px solid #4361ee;">
            <div style="margin-bottom: 8px;">
                <button id="btn-run-turn" style="background: #4361ee; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 2px;">Run 1 Turn</button>
                <button id="btn-auto" style="background: #4361ee; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 2px;">Auto Run</button>
            </div>
            <div style="margin-bottom: 8px;">
                <button id="btn-toggle-images" style="background: #4361ee; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 2px;">Show Images</button>
            </div>
            <div>
                <button id="btn-exit" style="background: #a03030; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 2px;">Exit Game</button>
                <span id="turn-info" style="color: #ffd700; margin-left: 10px;"></span>
            </div>
            <div style="color: #888; font-size: 11px; margin-top: 8px;">Keys: Space=turn, A=auto, Q=exit, C=toggle, I=images</div>
        </div>
    </div>

    <div id="setup-bar" class="setup-bar" style="display: none;">
        <div class="control-group">
            <label>Player 1 Deck</label>
            <select id="p1-deck"></select>
        </div>
        <div class="control-group">
            <label>Player 2 Deck</label>
            <select id="p2-deck"></select>
        </div>
        <div class="control-group">
            <label>P1 Controller</label>
            <select id="p1-controller">
                <option value="human">Human (You)</option>
                <option value="heuristic">Heuristic AI</option>
                <option value="random">Random</option>
                <option value="zero">Zero (Pass)</option>
            </select>
        </div>
        <div class="control-group">
            <label>P2 Controller</label>
            <select id="p2-controller">
                <option value="heuristic">Heuristic AI</option>
                <option value="random">Random</option>
                <option value="zero">Zero (Pass)</option>
            </select>
        </div>
        <div class="control-group">
            <label>
                <input type="checkbox" id="show-card-images" style="margin-right: 5px;">
                Show Card Images
            </label>
            <span style="color: #888; font-size: 11px;">Load card art from Scryfall</span>
        </div>
        <button id="btn-launch">Launch Fancy TUI</button>
        <span class="help-text">Human: Up/Down=select, Enter=confirm, 1-9=quick select | AI: Space=turn, A=auto | Q=exit, Tab=cycle</span>
    </div>

    <div class="tui-container">
        <div id="loading" class="loading">
            <div>Loading WebAssembly module...</div>
            <div id="loading-progress"></div>
        </div>
        <!-- RatZilla renders DOM-based terminal here -->
        <div id="ratzilla-terminal" style="display: none;"></div>
    </div>

    <script type="module">
        import init, {
            version,
            is_ready,
            WasmCardDatabase,
            WasmControllerType,
            launch_fancy_tui,
            tui_run_turn,
            tui_toggle_auto,
            tui_get_battlefield_cards,
            tui_get_card_positions
        } from './pkg/mtg_forge_rs.js';

        let cardDb = null;

        async function main() {
            const progress = document.getElementById('loading-progress');
            const status = document.getElementById('status');

            try {
                // Initialize WASM
                progress.textContent = 'Initializing WASM module...';
                await init();

                status.textContent = `WASM v${version()} - ${is_ready() ? 'Ready' : 'Error'}`;

                // Create card database
                progress.textContent = 'Loading card database...';
                cardDb = new WasmCardDatabase();

                // Load cards
                const cardsResp = await fetch('./data/cards.bin');
                if (!cardsResp.ok) {
                    throw new Error(`Failed to load cards.bin: ${cardsResp.status}. Run 'mtg export-wasm' first.`);
                }
                const cardsData = new Uint8Array(await cardsResp.arrayBuffer());
                const cardCount = cardDb.load_cards(cardsData);

                progress.textContent = `Loaded ${cardCount} cards. Loading decks...`;

                // Load decks
                const decksResp = await fetch('./data/decks.bin');
                if (!decksResp.ok) {
                    throw new Error(`Failed to load decks.bin: ${decksResp.status}. Run 'mtg export-wasm' first.`);
                }
                const decksData = new Uint8Array(await decksResp.arrayBuffer());
                const deckCount = cardDb.load_decks(decksData);

                // Get deck names and populate selectors
                const deckNames = JSON.parse(cardDb.get_deck_names_json());
                deckNames.sort();

                const p1DeckSelect = document.getElementById('p1-deck');
                const p2DeckSelect = document.getElementById('p2-deck');

                for (const name of deckNames) {
                    const info = JSON.parse(cardDb.get_deck_info_json(name));
                    const optionText = `${name} (${info.main_deck_count} cards)`;

                    p1DeckSelect.appendChild(new Option(optionText, name));
                    p2DeckSelect.appendChild(new Option(optionText, name));
                }

                // Select different decks by default
                if (deckNames.length >= 2) {
                    p2DeckSelect.selectedIndex = 1;
                }

                status.textContent = `WASM v${version()} | ${cardCount} cards, ${deckCount} decks`;

                // Hide loading, show setup
                document.getElementById('loading').style.display = 'none';
                document.getElementById('setup-bar').style.display = 'flex';

                // Set up launch button
                document.getElementById('btn-launch').addEventListener('click', launchTui);

                console.log(`MTG Forge WASM initialized: ${cardCount} cards, ${deckCount} decks`);
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        <strong>Failed to load:</strong><br>
                        ${error.message}<br><br>
                        Make sure you've:<br>
                        1. Built with wasm-tui: <code>make wasm-dev</code><br>
                        2. Exported card data: <code>cargo run --bin mtg -- export-wasm</code><br>
                        3. Started a web server: <code>make wasm-dev-serve</code>
                    </div>
                `;
                console.error('Failed to initialize:', error);
            }
        }

        function getControllerType(value) {
            switch (value) {
                case 'human': return WasmControllerType.Human;
                case 'zero': return WasmControllerType.Zero;
                case 'random': return WasmControllerType.Random;
                case 'heuristic': return WasmControllerType.Heuristic;
                default: return WasmControllerType.Heuristic;
            }
        }

        let tuiLaunched = false;
        let cardImagesEnabled = false;

        // Simple card image overlay manager (JavaScript implementation)
        const CardImageOverlay = {
            enabled: false,
            overlays: new Map(),

            enable() {
                this.enabled = true;
                console.log('Card image overlays enabled');
            },

            disable() {
                this.enabled = false;
                this.clearAll();
                console.log('Card image overlays disabled');
            },

            toggle() {
                if (this.enabled) {
                    this.disable();
                } else {
                    this.enable();
                }
                return this.enabled;
            },

            // Build Scryfall API URL for a card
            scryfallUrl(setCode, collectorNumber, size = 'small') {
                return `https://api.scryfall.com/cards/${setCode.toLowerCase()}/${collectorNumber}?format=image&version=${size}`;
            },

            // Convert terminal cell coordinates to pixel coordinates
            cellToPixels(col, row) {
                const CELL_WIDTH_PX = 10;
                const CELL_HEIGHT_PX = 20;
                return { left: col * CELL_WIDTH_PX, top: row * CELL_HEIGHT_PX };
            },

            // Add or update a card image overlay
            setCardImage(cardId, col, row, width, height, imageUrl) {
                if (!this.enabled) return;

                const imgId = `card-image-${cardId}`;
                let img = document.getElementById(imgId);

                if (!img) {
                    // Create new image element
                    img = document.createElement('img');
                    img.id = imgId;
                    img.className = 'card-overlay-image';
                    img.src = imageUrl;

                    img.onerror = () => {
                        console.warn(`Failed to load card image: ${imageUrl}`);
                    };

                    // Append to terminal container
                    const terminal = document.getElementById('ratzilla-terminal');
                    if (terminal) {
                        terminal.appendChild(img);
                    }
                }

                // Update position and size
                const pos = this.cellToPixels(col, row);
                const CELL_WIDTH_PX = 10;
                const CELL_HEIGHT_PX = 20;
                const widthPx = width * CELL_WIDTH_PX;
                const heightPx = height * CELL_HEIGHT_PX;

                img.style.position = 'absolute';
                img.style.left = `${pos.left}px`;
                img.style.top = `${pos.top}px`;
                img.style.width = `${widthPx}px`;
                img.style.height = `${heightPx}px`;
                img.style.objectFit = 'contain';
                img.style.pointerEvents = 'none';
                img.style.zIndex = '10';

                this.overlays.set(cardId, img);
            },

            // Remove a card image overlay
            removeOverlay(cardId) {
                const imgId = `card-image-${cardId}`;
                const img = document.getElementById(imgId);
                if (img) {
                    img.remove();
                    this.overlays.delete(cardId);
                }
            },

            // Clear all overlays
            clearAll() {
                const images = document.querySelectorAll('.card-overlay-image');
                images.forEach(img => img.remove());
                this.overlays.clear();
            },

            // Build Scryfall named card URL (doesn't require set/collector number)
            scryfallNamedUrl(cardName, size = 'small') {
                return `https://api.scryfall.com/cards/named?exact=${encodeURIComponent(cardName)}&format=image&version=${size}`;
            },

            // Display all battlefield cards using actual TUI positions
            displayBattlefieldCards() {
                if (!this.enabled) return;

                try {
                    // Get actual card positions from TUI renderer
                    const positionsJson = tui_get_card_positions();
                    const positions = JSON.parse(positionsJson);

                    console.log(`Displaying ${positions.length} battlefield cards with actual TUI positions`);

                    // Clear existing overlays first
                    this.clearAll();

                    // Use the actual positions from the TUI renderer
                    positions.forEach((cardPos) => {
                        const imageUrl = this.scryfallNamedUrl(cardPos.name, 'small');

                        // Use the exact position and size from the TUI
                        this.setCardImage(
                            cardPos.card_id,
                            cardPos.x,      // column position from TUI
                            cardPos.y,      // row position from TUI
                            cardPos.width,  // width in cells from TUI
                            cardPos.height, // height in cells from TUI
                            imageUrl
                        );
                    });
                } catch (error) {
                    console.error('Failed to display battlefield cards:', error);
                }
            },

            // Demo: show a test card image
            showTestCard() {
                if (!this.enabled) return;
                // Test: Show a Lightning Bolt at position (10, 5) with size (15, 20) cells
                // This is just a proof-of-concept - we'll integrate with real game state later
                const boltUrl = this.scryfallUrl('LEA', '163', 'small');
                this.setCardImage('test-bolt', 10, 5, 15, 20, boltUrl);
                console.log('Showing test card image (Lightning Bolt)');
            }
        };

        function launchTui() {
            const p1Deck = document.getElementById('p1-deck').value;
            const p2Deck = document.getElementById('p2-deck').value;
            const p1Controller = getControllerType(document.getElementById('p1-controller').value);
            const p2Controller = getControllerType(document.getElementById('p2-controller').value);
            const showImages = document.getElementById('show-card-images').checked;

            if (!p1Deck || !p2Deck) {
                alert('Please select decks for both players');
                return;
            }

            // Initialize card image overlay if enabled
            if (showImages) {
                CardImageOverlay.enable();
                cardImagesEnabled = true;
            }

            try {
                // Hide setup bar and header to give full viewport to TUI
                // RatZilla calculates terminal size from window dimensions, so we need full viewport
                document.getElementById('setup-bar').style.display = 'none';
                document.getElementById('header-bar').style.display = 'none';

                // Show the terminal container (RatZilla will render into body by default)
                const terminal = document.getElementById('ratzilla-terminal');
                terminal.style.display = 'block';

                // Get container dimensions (not used by RatZilla DOM backend, but kept for API compatibility)
                const container = document.querySelector('.tui-container');
                const canvasWidth = container.clientWidth || window.innerWidth;
                const canvasHeight = container.clientHeight || window.innerHeight;

                // Launch the fancy TUI
                const seed = BigInt(Date.now());
                launch_fancy_tui(
                    cardDb,
                    p1Deck,
                    p2Deck,
                    20,  // starting life
                    seed,
                    p1Controller,
                    p2Controller,
                    canvasWidth,
                    canvasHeight
                );

                tuiLaunched = true;

                // Show game controls widget (collapsed by default)
                document.getElementById('game-controls').style.display = 'block';

                // Show battlefield card images if enabled
                if (cardImagesEnabled) {
                    // Wait a bit for the TUI to render and game to start, then show images
                    setTimeout(() => {
                        CardImageOverlay.displayBattlefieldCards();
                        startImageRefresh();
                    }, 1000);
                }

                console.log(`Launched fancy TUI: ${p1Deck} vs ${p2Deck}`);
            } catch (error) {
                alert(`Failed to launch TUI: ${error}`);
                console.error('Failed to launch TUI:', error);
            }
        }

        let autoRunning = false;
        let refreshInterval = null;

        // Start periodic refresh of card images during gameplay
        function startImageRefresh() {
            if (refreshInterval) return; // Already running

            refreshInterval = setInterval(() => {
                if (cardImagesEnabled && tuiLaunched) {
                    CardImageOverlay.displayBattlefieldCards();
                }
            }, 2000); // Refresh every 2 seconds
        }

        function stopImageRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }

        // Update turn info display (called from WASM)
        window.updateTurnInfo = function(turnNumber, gameOver) {
            const info = document.getElementById('turn-info');
            const miniInfo = document.getElementById('turn-info-mini');
            if (gameOver) {
                info.textContent = 'Game Over!';
                info.style.color = '#ff6b6b';
                miniInfo.textContent = 'END';
                miniInfo.style.color = '#ff6b6b';
            } else {
                info.textContent = `Turn ${turnNumber}`;
                info.style.color = '#ffd700';
                miniInfo.textContent = `T${turnNumber}`;
                miniInfo.style.color = '#ffd700';
            }
        };

        // Toggle controls panel visibility
        let controlsExpanded = false;
        document.getElementById('btn-toggle-controls').addEventListener('click', function() {
            controlsExpanded = !controlsExpanded;
            const panel = document.getElementById('controls-panel');
            const icon = document.getElementById('toggle-icon');
            panel.style.display = controlsExpanded ? 'block' : 'none';
            icon.innerHTML = controlsExpanded ? '&#10005;' : '&#9776;';  // X or hamburger
        });

        // Button handlers - call WASM functions directly
        document.getElementById('btn-run-turn').addEventListener('click', function() {
            tui_run_turn();
        });

        document.getElementById('btn-auto').addEventListener('click', function() {
            autoRunning = !autoRunning;
            this.textContent = autoRunning ? 'Stop Auto' : 'Auto Run';
            this.style.background = autoRunning ? '#30a030' : '#4361ee';
            tui_toggle_auto();
        });

        document.getElementById('btn-exit').addEventListener('click', function() {
            window.exitFancyTui();
        });

        document.getElementById('btn-toggle-images').addEventListener('click', function() {
            const nowEnabled = CardImageOverlay.toggle();
            cardImagesEnabled = nowEnabled;
            this.textContent = nowEnabled ? 'Hide Images' : 'Show Images';
            this.style.background = nowEnabled ? '#30a030' : '#4361ee';

            // Refresh battlefield cards when enabled
            if (nowEnabled) {
                CardImageOverlay.displayBattlefieldCards();
                startImageRefresh();
            } else {
                stopImageRefresh();
            }
        });

        // Expose exit function globally for WASM to call
        window.exitFancyTui = function() {
            tuiLaunched = false;
            cardImagesEnabled = false;
            // Stop image refresh
            stopImageRefresh();
            // Clear card image overlays
            CardImageOverlay.disable();
            // Hide terminal and show setup bar + header
            document.getElementById('ratzilla-terminal').style.display = 'none';
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('header-bar').style.display = 'flex';
            document.getElementById('setup-bar').style.display = 'flex';
            // Reload the page to cleanly reset RatZilla state
            location.reload();
        };

        main();
    </script>
</body>
</html>
