<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Forge - Fancy TUI (WASM)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px 20px;
            background: #16213e;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .header h1 {
            color: #ffd700;
            font-size: 20px;
            margin: 0;
        }
        .header a {
            color: #4cc9f0;
            text-decoration: none;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .setup-bar {
            padding: 10px 20px;
            background: #0f3460;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .setup-bar label {
            color: #888;
            font-size: 12px;
        }
        .setup-bar select {
            background: #16213e;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        .setup-bar button {
            background: #4361ee;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .setup-bar button:hover {
            background: #3a0ca3;
        }
        .setup-bar button:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .help-text {
            color: #888;
            font-size: 12px;
            margin-left: auto;
        }
        .tui-container {
            flex: 1;
            display: flex;
            justify-content: stretch;
            align-items: stretch;
            padding: 0;
            background: #000;
            overflow: hidden;
        }
        /* RatZilla renders terminal content here */
        #ratzilla-terminal {
            width: 100%;
            height: 100%;
            font-family: 'Consolas', 'Monaco', 'Fira Mono', monospace;
            font-size: 14px;
            line-height: 1.2;
            background: #000;
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .error {
            background: #4a1010;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }
        #status {
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MTG Forge - Fancy TUI</h1>
        <a href="index.html">Back to simple view</a>
        <span id="status">Loading...</span>
        <!-- Game controls shown during gameplay -->
        <div id="game-controls" style="display: none; margin-left: auto;">
            <button id="btn-run-turn" style="background: #4361ee; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 0 5px;">Run 1 Turn</button>
            <button id="btn-auto" style="background: #4361ee; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 0 5px;">Auto Run</button>
            <button id="btn-exit" style="background: #a03030; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin: 0 5px;">Exit Game</button>
            <span id="turn-info" style="color: #ffd700; margin-left: 15px;"></span>
        </div>
    </div>

    <div id="setup-bar" class="setup-bar" style="display: none;">
        <div class="control-group">
            <label>Player 1 Deck</label>
            <select id="p1-deck"></select>
        </div>
        <div class="control-group">
            <label>Player 2 Deck</label>
            <select id="p2-deck"></select>
        </div>
        <div class="control-group">
            <label>P1 Controller</label>
            <select id="p1-controller">
                <option value="heuristic">Heuristic AI</option>
                <option value="random">Random</option>
                <option value="zero">Zero (Pass)</option>
            </select>
        </div>
        <div class="control-group">
            <label>P2 Controller</label>
            <select id="p2-controller">
                <option value="heuristic">Heuristic AI</option>
                <option value="random">Random</option>
                <option value="zero">Zero (Pass)</option>
            </select>
        </div>
        <button id="btn-launch">Launch Fancy TUI</button>
        <span class="help-text">Keys: Space=turn, A=auto, Q=exit, Tab=cycle panes</span>
    </div>

    <div class="tui-container">
        <div id="loading" class="loading">
            <div>Loading WebAssembly module...</div>
            <div id="loading-progress"></div>
        </div>
        <!-- RatZilla renders DOM-based terminal here -->
        <div id="ratzilla-terminal" style="display: none;"></div>
    </div>

    <script type="module">
        import init, {
            version,
            is_ready,
            WasmCardDatabase,
            WasmControllerType,
            launch_fancy_tui,
            tui_run_turn,
            tui_toggle_auto
        } from './pkg/mtg_forge_rs.js';

        let cardDb = null;

        async function main() {
            const progress = document.getElementById('loading-progress');
            const status = document.getElementById('status');

            try {
                // Initialize WASM
                progress.textContent = 'Initializing WASM module...';
                await init();

                status.textContent = `WASM v${version()} - ${is_ready() ? 'Ready' : 'Error'}`;

                // Create card database
                progress.textContent = 'Loading card database...';
                cardDb = new WasmCardDatabase();

                // Load cards
                const cardsResp = await fetch('./data/cards.bin');
                if (!cardsResp.ok) {
                    throw new Error(`Failed to load cards.bin: ${cardsResp.status}. Run 'mtg export-wasm' first.`);
                }
                const cardsData = new Uint8Array(await cardsResp.arrayBuffer());
                const cardCount = cardDb.load_cards(cardsData);

                progress.textContent = `Loaded ${cardCount} cards. Loading decks...`;

                // Load decks
                const decksResp = await fetch('./data/decks.bin');
                if (!decksResp.ok) {
                    throw new Error(`Failed to load decks.bin: ${decksResp.status}. Run 'mtg export-wasm' first.`);
                }
                const decksData = new Uint8Array(await decksResp.arrayBuffer());
                const deckCount = cardDb.load_decks(decksData);

                // Get deck names and populate selectors
                const deckNames = JSON.parse(cardDb.get_deck_names_json());
                deckNames.sort();

                const p1DeckSelect = document.getElementById('p1-deck');
                const p2DeckSelect = document.getElementById('p2-deck');

                for (const name of deckNames) {
                    const info = JSON.parse(cardDb.get_deck_info_json(name));
                    const optionText = `${name} (${info.main_deck_count} cards)`;

                    p1DeckSelect.appendChild(new Option(optionText, name));
                    p2DeckSelect.appendChild(new Option(optionText, name));
                }

                // Select different decks by default
                if (deckNames.length >= 2) {
                    p2DeckSelect.selectedIndex = 1;
                }

                status.textContent = `WASM v${version()} | ${cardCount} cards, ${deckCount} decks`;

                // Hide loading, show setup
                document.getElementById('loading').style.display = 'none';
                document.getElementById('setup-bar').style.display = 'flex';

                // Set up launch button
                document.getElementById('btn-launch').addEventListener('click', launchTui);

                console.log(`MTG Forge WASM initialized: ${cardCount} cards, ${deckCount} decks`);
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        <strong>Failed to load:</strong><br>
                        ${error.message}<br><br>
                        Make sure you've:<br>
                        1. Built with wasm-tui: <code>make wasm-dev</code><br>
                        2. Exported card data: <code>cargo run --bin mtg -- export-wasm</code><br>
                        3. Started a web server: <code>make wasm-dev-serve</code>
                    </div>
                `;
                console.error('Failed to initialize:', error);
            }
        }

        function getControllerType(value) {
            switch (value) {
                case 'zero': return WasmControllerType.Zero;
                case 'random': return WasmControllerType.Random;
                case 'heuristic': return WasmControllerType.Heuristic;
                default: return WasmControllerType.Heuristic;
            }
        }

        let tuiLaunched = false;

        function launchTui() {
            const p1Deck = document.getElementById('p1-deck').value;
            const p2Deck = document.getElementById('p2-deck').value;
            const p1Controller = getControllerType(document.getElementById('p1-controller').value);
            const p2Controller = getControllerType(document.getElementById('p2-controller').value);

            if (!p1Deck || !p2Deck) {
                alert('Please select decks for both players');
                return;
            }

            try {
                // Hide setup bar
                document.getElementById('setup-bar').style.display = 'none';

                // Show the terminal container (RatZilla will render into body by default)
                const terminal = document.getElementById('ratzilla-terminal');
                terminal.style.display = 'block';

                // Get container dimensions (not used by RatZilla DOM backend, but kept for API compatibility)
                const container = document.querySelector('.tui-container');
                const canvasWidth = container.clientWidth || window.innerWidth;
                const canvasHeight = container.clientHeight || window.innerHeight;

                // Launch the fancy TUI
                const seed = BigInt(Date.now());
                launch_fancy_tui(
                    cardDb,
                    p1Deck,
                    p2Deck,
                    20,  // starting life
                    seed,
                    p1Controller,
                    p2Controller,
                    canvasWidth,
                    canvasHeight
                );

                tuiLaunched = true;

                // Show game controls in header
                document.getElementById('game-controls').style.display = 'flex';

                console.log(`Launched fancy TUI: ${p1Deck} vs ${p2Deck}`);
            } catch (error) {
                alert(`Failed to launch TUI: ${error}`);
                console.error('Failed to launch TUI:', error);
            }
        }

        let autoRunning = false;

        // Update turn info display (called from WASM)
        window.updateTurnInfo = function(turnNumber, gameOver) {
            const info = document.getElementById('turn-info');
            if (gameOver) {
                info.textContent = 'Game Over!';
                info.style.color = '#ff6b6b';
            } else {
                info.textContent = `Turn ${turnNumber}`;
                info.style.color = '#ffd700';
            }
        };

        // Button handlers - call WASM functions directly
        document.getElementById('btn-run-turn').addEventListener('click', function() {
            tui_run_turn();
        });

        document.getElementById('btn-auto').addEventListener('click', function() {
            autoRunning = !autoRunning;
            this.textContent = autoRunning ? 'Stop Auto' : 'Auto Run';
            this.style.background = autoRunning ? '#30a030' : '#4361ee';
            tui_toggle_auto();
        });

        document.getElementById('btn-exit').addEventListener('click', function() {
            window.exitFancyTui();
        });

        // Expose exit function globally for WASM to call
        window.exitFancyTui = function() {
            tuiLaunched = false;
            // Hide terminal and show setup bar
            document.getElementById('ratzilla-terminal').style.display = 'none';
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('setup-bar').style.display = 'flex';
            // Reload the page to cleanly reset RatZilla state
            location.reload();
        };

        main();
    </script>
</body>
</html>
