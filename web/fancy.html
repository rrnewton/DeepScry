<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTG Forge - Fancy TUI (WASM)</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 15px 20px;
            background: #16213e;
            display: flex;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .header h1 {
            color: #ffd700;
            font-size: 20px;
            margin: 0;
        }
        .header a {
            color: #4cc9f0;
            text-decoration: none;
        }
        .header a:hover {
            text-decoration: underline;
        }
        .setup-bar {
            padding: 10px 20px;
            background: #0f3460;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .setup-bar label {
            color: #888;
            font-size: 12px;
        }
        .setup-bar select {
            background: #16213e;
            color: white;
            border: 1px solid #444;
            padding: 8px;
            border-radius: 4px;
            font-size: 14px;
        }
        .setup-bar button {
            background: #4361ee;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .setup-bar button:hover {
            background: #3a0ca3;
        }
        .setup-bar button:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }
        .canvas-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #0a0a1a;
        }
        #mtg-fancy-tui-canvas {
            border: 2px solid #333;
            border-radius: 4px;
            /* Size is set dynamically via JavaScript */
        }
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .error {
            background: #4a1010;
            color: #ff6b6b;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
        }
        #status {
            color: #888;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>MTG Forge - Fancy TUI</h1>
        <a href="index.html">Back to simple view</a>
        <span id="status">Loading...</span>
    </div>

    <div id="setup-bar" class="setup-bar" style="display: none;">
        <div class="control-group">
            <label>Player 1 Deck</label>
            <select id="p1-deck"></select>
        </div>
        <div class="control-group">
            <label>Player 2 Deck</label>
            <select id="p2-deck"></select>
        </div>
        <div class="control-group">
            <label>P1 Controller</label>
            <select id="p1-controller">
                <option value="heuristic">Heuristic AI</option>
                <option value="random">Random</option>
                <option value="zero">Zero (Pass)</option>
            </select>
        </div>
        <div class="control-group">
            <label>P2 Controller</label>
            <select id="p2-controller">
                <option value="heuristic">Heuristic AI</option>
                <option value="random">Random</option>
                <option value="zero">Zero (Pass)</option>
            </select>
        </div>
        <button id="btn-launch">Launch Fancy TUI</button>
    </div>

    <div class="canvas-container">
        <div id="loading" class="loading">
            <div>Loading WebAssembly module...</div>
            <div id="loading-progress"></div>
        </div>
        <!-- Canvas for egui/eframe rendering -->
        <canvas id="mtg-fancy-tui-canvas" style="display: none;"></canvas>
    </div>

    <script type="module">
        import init, {
            version,
            is_ready,
            WasmCardDatabase,
            WasmControllerType,
            launch_fancy_tui
        } from './pkg/mtg_forge_rs.js';

        let cardDb = null;

        async function main() {
            const progress = document.getElementById('loading-progress');
            const status = document.getElementById('status');

            try {
                // Initialize WASM
                progress.textContent = 'Initializing WASM module...';
                await init();

                status.textContent = `WASM v${version()} - ${is_ready() ? 'Ready' : 'Error'}`;

                // Create card database
                progress.textContent = 'Loading card database...';
                cardDb = new WasmCardDatabase();

                // Load cards
                const cardsResp = await fetch('./data/cards.bin');
                if (!cardsResp.ok) {
                    throw new Error(`Failed to load cards.bin: ${cardsResp.status}. Run 'mtg export-wasm' first.`);
                }
                const cardsData = new Uint8Array(await cardsResp.arrayBuffer());
                const cardCount = cardDb.load_cards(cardsData);

                progress.textContent = `Loaded ${cardCount} cards. Loading decks...`;

                // Load decks
                const decksResp = await fetch('./data/decks.bin');
                if (!decksResp.ok) {
                    throw new Error(`Failed to load decks.bin: ${decksResp.status}. Run 'mtg export-wasm' first.`);
                }
                const decksData = new Uint8Array(await decksResp.arrayBuffer());
                const deckCount = cardDb.load_decks(decksData);

                // Get deck names and populate selectors
                const deckNames = JSON.parse(cardDb.get_deck_names_json());
                deckNames.sort();

                const p1DeckSelect = document.getElementById('p1-deck');
                const p2DeckSelect = document.getElementById('p2-deck');

                for (const name of deckNames) {
                    const info = JSON.parse(cardDb.get_deck_info_json(name));
                    const optionText = `${name} (${info.main_deck_count} cards)`;

                    p1DeckSelect.appendChild(new Option(optionText, name));
                    p2DeckSelect.appendChild(new Option(optionText, name));
                }

                // Select different decks by default
                if (deckNames.length >= 2) {
                    p2DeckSelect.selectedIndex = 1;
                }

                status.textContent = `WASM v${version()} | ${cardCount} cards, ${deckCount} decks`;

                // Hide loading, show setup
                document.getElementById('loading').style.display = 'none';
                document.getElementById('setup-bar').style.display = 'flex';

                // Set up launch button
                document.getElementById('btn-launch').addEventListener('click', launchTui);

                console.log(`MTG Forge WASM initialized: ${cardCount} cards, ${deckCount} decks`);
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <div class="error">
                        <strong>Failed to load:</strong><br>
                        ${error.message}<br><br>
                        Make sure you've:<br>
                        1. Built with wasm-tui: <code>wasm-pack build --target web --features wasm-tui --no-default-features</code><br>
                        2. Exported card data: <code>cargo run --bin mtg -- export-wasm</code><br>
                        3. Started a web server: <code>python -m http.server 8765</code>
                    </div>
                `;
                console.error('Failed to initialize:', error);
            }
        }

        function getControllerType(value) {
            switch (value) {
                case 'zero': return WasmControllerType.Zero;
                case 'random': return WasmControllerType.Random;
                case 'heuristic': return WasmControllerType.Heuristic;
                default: return WasmControllerType.Heuristic;
            }
        }

        function launchTui() {
            const p1Deck = document.getElementById('p1-deck').value;
            const p2Deck = document.getElementById('p2-deck').value;
            const p1Controller = getControllerType(document.getElementById('p1-controller').value);
            const p2Controller = getControllerType(document.getElementById('p2-controller').value);

            if (!p1Deck || !p2Deck) {
                alert('Please select decks for both players');
                return;
            }

            try {
                // Hide setup bar
                document.getElementById('setup-bar').style.display = 'none';

                // Calculate available space for the canvas
                // Account for header (roughly 60px) and some padding
                const container = document.querySelector('.canvas-container');
                const headerHeight = document.querySelector('.header').offsetHeight;
                const availWidth = window.innerWidth - 40;  // 20px padding on each side
                const availHeight = window.innerHeight - headerHeight - 60;  // header + padding

                // Clamp to reasonable bounds (min 600x400, max 1600x1000)
                const canvasWidth = Math.max(600, Math.min(1600, availWidth));
                const canvasHeight = Math.max(400, Math.min(1000, availHeight));

                console.log(`Window: ${window.innerWidth}x${window.innerHeight}, Canvas: ${canvasWidth}x${canvasHeight}`);

                // Show and size the canvas
                const canvas = document.getElementById('mtg-fancy-tui-canvas');
                canvas.style.display = 'block';
                canvas.width = canvasWidth;
                canvas.height = canvasHeight;
                canvas.style.width = canvasWidth + 'px';
                canvas.style.height = canvasHeight + 'px';

                // Launch the fancy TUI with calculated dimensions
                const seed = BigInt(Date.now());
                launch_fancy_tui(
                    cardDb,
                    p1Deck,
                    p2Deck,
                    20,  // starting life
                    seed,
                    p1Controller,
                    p2Controller,
                    canvasWidth,
                    canvasHeight
                );

                console.log(`Launched fancy TUI: ${p1Deck} vs ${p2Deck} at ${canvasWidth}x${canvasHeight}`);
            } catch (error) {
                alert(`Failed to launch TUI: ${error}`);
                console.error('Failed to launch TUI:', error);
            }
        }

        main();
    </script>
</body>
</html>
