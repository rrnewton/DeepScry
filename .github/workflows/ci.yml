name: CI

on:
  push:
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

# mtg-717: CI is now a MATRIX over the validate jobGroups, each shard invoking
# the SAME orchestrator local `make validate` uses:
#     python3 scripts/validate_run.py --group <jobGroup>
# This makes CI identical to local by construction — the step registry in
# scripts/validate_run.py is the single source of truth, so CI can never drift
# from local (the old hand-maintained per-job step lists did: at one point CI
# ran 2 of 9 wasm e2e tests). Each shard runs on its own runner with its own
# target/ dir, so the shared release+network `mtg` build (a dep of unit/determ/
# wasm/network) compiles per-shard in PARALLEL with no cross-shard lock
# contention — the sharding payoff. `--group` automatically pulls in a group's
# deps (e.g. build.mtg-release, wasm.bundle), so each shard is self-contained.

jobs:
  validate:
    name: validate ${{ matrix.group }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group: [lint, unit, examples, agentplay, determ, wasm, network]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Rust toolchain. clippy/rustfmt for `lint`; the wasm32 target is needed
      # by `lint` (clippy-wasm) and the `wasm`/`network` bundle builds.
      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - name: Install nextest
        if: ${{ matrix.group == 'unit' || matrix.group == 'determ' }}
        uses: taiki-e/install-action@nextest

      - name: Set up Python
        if: ${{ matrix.group == 'agentplay' }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        if: ${{ matrix.group == 'agentplay' }}
        run: pip install pytest

      - name: Set up Node.js
        if: ${{ matrix.group == 'wasm' || matrix.group == 'network' }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install wasm-pack
        if: ${{ matrix.group == 'wasm' || matrix.group == 'network' }}
        run: cargo install wasm-pack
      - name: Install Playwright + chromium
        if: ${{ matrix.group == 'wasm' || matrix.group == 'network' }}
        run: cd web && npm install && npx playwright install chromium --with-deps

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            target
          key: ${{ runner.os }}-${{ matrix.group }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h

      # The shard. `--group` runs the group's steps + their deps (build-once
      # mtg / wasm bundle) self-contained. -j defaults to the runner's nproc.
      - name: Run validate group (${{ matrix.group }})
        run: python3 scripts/validate_run.py --group ${{ matrix.group }}

      - name: Upload step logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-steps-${{ matrix.group }}
          path: validate_logs/steps_*/
          if-no-files-found: ignore
