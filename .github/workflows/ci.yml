name: CI

on:
  push:
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # The old monolithic `Test` job ran `cargo test --verbose --workspace
  # --features network` SERIALLY on a single 2-vCPU runner (~125 min, mtg-578).
  # Profiling showed two test binaries dominated wall time:
  #   - determinism_e2e  (66 tests, each runs a full game TWICE; subprocess-heavy)
  #   - shell_script_tests (28 tests/*.sh full games; several rebuilt the binary)
  # We split the single job into THREE parallel jobs so wall-time = max() not
  # sum(): test-unit, test-determinism, test-shell. The 1230 total tests
  # partition with NO gaps/overlap:
  #   - test-determinism: binary(determinism_e2e)         -> 66
  #   - test-shell:       binary(shell_script_tests)      -> 28
  #   - test-unit:        everything else (the exclusion) -> 1136
  # (66 + 28 + 1136 = 1230, verified via `cargo nextest list -E ...`.)
  #
  # All three run on the STANDARD ubuntu-latest 2-vCPU runner. To further speed
  # up test-determinism/test-shell, switch their `runs-on:` to a LARGER runner
  # (4-8 vCPU) once such a runner is enabled on the GitHub account/billing
  # (org runner-group or `runs-on: ubuntu-latest-4-cores`). Tracked in
  # mtg-578's larger-runner follow-up. The bottleneck for these two jobs is
  # core oversubscription from per-test full-game subprocesses, so more cores
  # is the highest-leverage next step.

  # Fast unit + remaining integration tests. Also carries the non-cargo
  # validation steps (examples, agentplay/pytest, mode-equivalence) since they
  # are quick and were part of the old Test job.
  test-unit:
    name: Test (unit + integration)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      # Free additional runner disk so the release `mtg --features network`
      # build + the example/agentplay runs have headroom. Observed at 6db45ef1:
      # "No space left on device" on a runner with only the default ~14 GB
      # free. This drops ~30 GB of unused toolchains.
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h

      # Pre-build the release binary with the network feature: examples and the
      # mode-equivalence orchestrator below exercise it, and the network feature
      # must compile cleanly before the test run.
      - name: Build release binary (network feature)
        run: cargo build --release --bin mtg --features network

      # Everything EXCEPT the two heavy binaries (which run in their own jobs).
      # `--features network` matches `make validate` (cargo nextest run
      # --features network). Without it, `#[cfg(feature = "network")]` tests are
      # silently skipped. The filterset is the exact complement of the
      # determinism/shell jobs, so the three jobs cover all tests with no gaps.
      - name: Run unit + integration tests (nextest)
        run: cargo nextest run -p mtg-forge-rs --features network -E 'not binary(determinism_e2e) and not binary(shell_script_tests)'

      - name: Run examples
        run: ./scripts/run_examples.sh

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest
        run: pip install pytest

      - name: Run agentplay tests
        run: |
          python3 -m pytest agentplay/ -v
          # Use --max-turns 100 so the mock self-play game has time to
          # reach a winner; agent_game.py returns exit code 2 if the turn
          # limit is hit before either side wins, which would fail the CI
          # step.
          python3 agentplay/agent_game.py --mock --seed 42 --max-turns 100 -- decks/simple_bolt.dck decks/simple_bolt.dck

      # Parity with `make validate-agentplay-step`. The mode-equivalence
      # script asserts that native and WASM controller drivers produce
      # identical action streams + game logs, which is the line-of-defense
      # against the kind of information-leakage bug described in
      # docs/NETWORK_ARCHITECTURE.md.
      - name: Run mode-equivalence orchestrator
        run: ./scripts/test_mode_equivalence.sh

  # Determinism harness: 66 tests, each plays a full game twice and asserts
  # byte-identical gamelogs. The single heaviest binary; isolated so its
  # subprocess churn no longer thrashes the rest of the suite. nextest runs it
  # across the 2 cores. The dedicated commander_e2e + snapshot_resume steps
  # (full-game determinism scripts) live here so all determinism coverage is in
  # one job/badge.
  test-determinism:
    name: Test (determinism_e2e)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h

      # commander_e2e.sh + snapshot_resume_e2e.sh reuse this prebuilt binary
      # (MTG_REUSE_PREBUILT below), so build it once up front.
      - name: Build release binary (network feature)
        run: cargo build --release --bin mtg --features network

      - name: Run determinism_e2e (nextest)
        run: cargo nextest run -p mtg-forge-rs --features network -E 'binary(determinism_e2e)'

      # Dedicated steps for the two full-game determinism scripts (also
      # auto-discovered by shell_script_tests, but run explicitly here so a
      # regression gets its own named step instead of being buried). They reuse
      # the binary built above instead of rebuilding it (mtg-578 tent-pole).
      - name: Run commander E2E test
        env:
          MTG_REUSE_PREBUILT: "1"
        run: bash tests/commander_e2e.sh

      - name: Run snapshot/resume E2E test
        env:
          MTG_REUSE_PREBUILT: "1"
        run: bash tests/snapshot_resume_e2e.sh

  # Shell-script tests: 28 tests/*.sh full games. Previously the single biggest
  # serial cost (~1046s) because each script's ensure_mtg_binary() ran a fresh
  # `cargo build --release`. TENT-POLE FIX (mtg-578): build the binary ONCE in
  # the step below, then set MTG_REUSE_PREBUILT=1 so tests/lib/test_helpers.sh
  # reuses target/release/mtg instead of rebuilding per script.
  #
  # We deliberately run this binary SERIALLY (--test-threads=1). nextest's
  # cross-binary/cross-test parallelism oversubscribes the 2 cores for these
  # subprocess-heavy full-game scripts (each spawns server + clients), which
  # *inflates* wall time rather than helping. Serial is faster + more stable
  # here; the parallelism win comes from this job running concurrently with
  # test-unit and test-determinism on a separate runner.
  test-shell:
    name: Test (shell_script_tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h

      # Build the release+network binary ONCE. The shell scripts reuse it via
      # MTG_REUSE_PREBUILT=1 (see tests/lib/test_helpers.sh::ensure_mtg_binary)
      # instead of each running their own `cargo build`.
      - name: Build release binary (network feature)
        run: cargo build --release --bin mtg --features network

      # Run the shell binary serially (--test-threads=1) and reuse the prebuilt
      # mtg binary. nextest still discovers the 28 scripts as test cases.
      - name: Run shell_script_tests (nextest, serial + binary reuse)
        env:
          MTG_REUSE_PREBUILT: "1"
        run: cargo nextest run -p mtg-forge-rs --features network -E 'binary(shell_script_tests)' --test-threads=1

  wasm:
    name: WASM Build and E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-wasm-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM (dev)
        run: make wasm-dev

      - name: Export WASM data files
        run: |
          cargo build --release --bin mtg
          ./target/release/mtg export-wasm

      - name: Install Playwright and dependencies
        run: |
          cd web
          npm install
          npx playwright install chromium --with-deps

      # Mirror the full local `validate-wasm-e2e-step` test list. Previously
      # only 2 of 9 tests ran here; the remaining 7 cover the rebuilt
      # thin-DOM game GUI, click+log paths, font/card-size layout, and
      # tapped-creature/graveyard rendering — all of which have shipped
      # real regressions in the past.
      - name: Run WASM e2e tests
        run: |
          cd web
          node test_fancy_tui.js
          node test_human_input.js
          node test_click_and_log.js
          node test_font_size_layout.js
          node test_decouple_step3_launch_game_session.js
          node test_card_size_stability.js
          node test_decouple_step6_valid_choices.js
          node test_tapped_rotation.js
          node test_graveyard_overlay.js

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-e2e-screenshots
          path: web/screenshots/

  network:
    name: Network E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: cargo install wasm-pack

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-network-cargo-build-${{ hashFiles('**/Cargo.lock') }}

      - name: Build native server (release + network)
        run: make build-network

      - name: Build WASM (network)
        run: make wasm-network

      - name: Install Playwright and dependencies
        run: |
          cd web
          npm install
          npx playwright install chromium --with-deps

      - name: Run Network GUI E2E test (baseline)
        run: cd web && node test_network_gui_e2e.js

      - name: Run Network multi-deck E2E test
        run: cd web && node test_network_multideck.js --quick

      - name: Run Network click and log test
        run: cd web && node test_network_click.js

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: network-e2e-screenshots
          path: |
            web/screenshots/
            debug/

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
          targets: wasm32-unknown-unknown

      # Three invocations match `make clippy` + `make clippy-wasm`:
      # 1. native + all-features + network (catches default + most-coverage code paths)
      # 2. wasm,network feature combo (WASM+server, used by browser multiplayer)
      # 3. mtg-benchmarks crate (mutually-exclusive features, run alone)
      # 4. WASM target (catches #[cfg(target_arch = "wasm32")] paths the
      #    native clippy can't see — previously a real source of CI surprises
      #    when local validate caught lints that the native CI clippy missed)
      - name: Run clippy
        run: |
          cargo clippy -p mtg-forge-rs --all-targets --all-features --features network -- -D warnings
          cargo clippy -p mtg-forge-rs --all-targets --features wasm,network -- -D warnings
          cargo clippy -p mtg-benchmarks --all-targets -- -D warnings

      - name: Run clippy (WASM target)
        run: cargo clippy -p mtg-forge-rs --target wasm32-unknown-unknown --no-default-features --features wasm-tui -- -D warnings
