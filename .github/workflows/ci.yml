name: CI

on:
  push:
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  # mtg-717 build-once: ONE feature/profile string, referenced by BOTH the
  # native binary producer AND the nextest-archive producer, so they can never
  # drift (a nextest archive does NOT re-derive features at run time — a mismatch
  # would yield binaries the e2e scripts reject). Risk #1 mitigation.
  BUILD_FLAGS: "--release --features network"

# mtg-717: CI is BUILD-ONCE + sharded. Three producer jobs compile the shared
# artifacts EXACTLY ONCE; the consumer matrix downloads them and runs tests with
# ZERO compilation (validate_run.py --use-prebuilt drops the build.mtg-release +
# wasm.bundle steps from the DAG). Root cause fixed: the old per-shard cache key
# (`...-${{matrix.name}}-target-...`) put every shard in a disjoint namespace, so
# all 9 shards cold-built the release binary (~1h each on 2-vCPU). Now: build
# native mtg + wasm bundle + nextest archive once, fan out as artifacts.
# `quick` (lint/examples) is UNGATED (no artifact to consume) so it starts at t=0.
# Each shard runs validate_run.py with --group/--only EXACTLY as local
# `make validate` does — CI == local by construction (the registry is the single
# source of truth).

jobs:
  # ---------------- artifact producers (compile ONCE) ----------------
  build-native:
    name: build native mtg (once)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/integration' || github.ref == 'refs/heads/main' }}
      - name: Build release mtg (shared binary)
        run: cargo build ${{ env.BUILD_FLAGS }} --bin mtg
      - uses: actions/upload-artifact@v4
        with:
          name: mtg-bin
          path: target/release/mtg
          compression-level: 0
          retention-days: 1

  build-wasm:
    name: build wasm bundle (once)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/integration' || github.ref == 'refs/heads/main' }}
      - name: Install wasm-pack
        run: cargo install wasm-pack
      # make wasm-dev = export-wasm (builds its own native mtg for the export) +
      # wasm-pack dev build into WASM_TARGET_DIR=target/wasm. Self-contained, so
      # this job does NOT need build-native. Native + wasm in SEPARATE jobs =
      # no target/ collision (risk #2).
      - name: Build wasm bundle + export data
        run: make wasm-dev
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: |
            web/pkg
            web/data
          retention-days: 1

  build-nextest-arch:
    name: build nextest archive (once)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/integration' || github.ref == 'refs/heads/main' }}
      - uses: taiki-e/install-action@nextest
      # SAME $BUILD_FLAGS as build-native so the archived test binaries match the
      # binary + what `cargo nextest run --archive-file` expects (risk #1).
      - name: Archive test binaries
        run: cargo nextest archive ${{ env.BUILD_FLAGS }} --archive-file nextest.tar.zst
      - uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: nextest.tar.zst
          compression-level: 0
          retention-days: 1

  # ---------------- ungated quick shards (compile-check their own) ----------------
  # lint (clippy/fmt) + examples consume NO shared artifact (they compile-check
  # their own targets), so they are NOT gated on the producers — they start at
  # t=0 and compile concurrently with the producer builds. (risk #7)
  quick:
    name: validate ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: lint,     args: "--group lint" }
          - { name: examples, args: "--group examples" }
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - name: Warm up toolchain components
        run: |
          rustup component add clippy rustfmt 2>/dev/null || true
          cargo clippy --version && cargo fmt --version
      - uses: Swatinem/rust-cache@v2
        with:
          save-if: ${{ github.ref == 'refs/heads/integration' || github.ref == 'refs/heads/main' }}
      - name: Run validate (${{ matrix.name }})
        run: python3 scripts/validate_run.py ${{ matrix.args }}

  # ---------------- artifact-consuming shards (ZERO compilation) ----------------
  validate:
    name: validate ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [build-native, build-wasm, build-nextest-arch]
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: unit,          args: "--group unit",      nextest: true, bin: true, arch: true }
          - { name: agentplay,     args: "--group agentplay", python: true, bin: true }
          - { name: determ,        args: "--group determ",    bin: true }
          - { name: wasm,          args: "--group wasm",      browser: true, bin: true, wasm: true }
          - { name: network-gui,   args: "--only network.playwright-check,network.gui,network.human-input,network.multideck", browser: true, bin: true, wasm: true }
          - { name: network-redo,  args: "--only network.click,network.landing,network.redo-reload,network.redo-lobby,network.smoke,network.deploy-nav", browser: true, bin: true, wasm: true }
          - { name: network-equiv, args: "--only network.equiv-random,network.equiv-zero,network.equiv-heuristic,network.robots42,network.fuzz", bin: true }
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }   # REQUIRED: nextest archive omits source; --workspace-remap remaps to it
      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
      # Rust toolchain is still needed to INVOKE cargo nextest (to run the
      # archived bins) — but no project compilation happens here.
      - uses: dtolnay/rust-toolchain@nightly

      - name: Install nextest
        if: ${{ matrix.nextest }}
        uses: taiki-e/install-action@nextest

      - name: Set up Python
        if: ${{ matrix.python }}
        uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install pytest
        if: ${{ matrix.python }}
        run: pip install pytest

      # Browser shards need node + chromium to RUN the downloaded wasm bundle —
      # but NOT wasm-pack (no wasm compilation here; the bundle is an artifact).
      - name: Set up Node.js
        if: ${{ matrix.browser }}
        uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install Playwright + chromium
        if: ${{ matrix.browser }}
        run: cd web && npm install && npx playwright install chromium --with-deps

      # ---- download the prebuilt artifacts this shard consumes ----
      - name: Download prebuilt mtg binary
        if: ${{ matrix.bin }}
        uses: actions/download-artifact@v4
        with: { name: mtg-bin, path: target/release }
      - name: Make mtg executable
        if: ${{ matrix.bin }}
        run: chmod +x target/release/mtg
      - name: Download prebuilt wasm bundle
        if: ${{ matrix.wasm }}
        uses: actions/download-artifact@v4
        with: { name: wasm-pkg, path: . }
      - name: Download nextest archive
        if: ${{ matrix.arch }}
        uses: actions/download-artifact@v4
        with: { name: nextest-archive }

      # Run with ZERO compilation. --use-prebuilt drops build.mtg-release +
      # wasm.bundle from the DAG; MTG_REUSE_PREBUILT reuses the downloaded binary
      # (hard-fails if absent — never silent cold rebuild); MTG_EQUIV_NO_BUILD
      # skips the wasm rebuild in the equiv sweep; NEXTEST_ARCHIVE makes
      # `make test` run the archived bins. Per-step timeouts cap any hang.
      - name: Run validate (${{ matrix.name }})
        env:
          MTG_REUSE_PREBUILT: ${{ matrix.bin && '1' || '' }}
          MTG_EQUIV_NO_BUILD: ${{ matrix.wasm && '1' || '' }}
          NEXTEST_ARCHIVE: ${{ matrix.arch && 'nextest.tar.zst' || '' }}
        run: python3 scripts/validate_run.py ${{ matrix.args }} --use-prebuilt

      - name: Upload step logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-steps-${{ matrix.name }}
          path: validate_logs/steps_*/
          if-no-files-found: ignore
