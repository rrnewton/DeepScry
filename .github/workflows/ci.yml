name: CI

on:
  push:
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

# mtg-717: CI is a MATRIX of validate shards, each invoking the SAME orchestrator
# local `make validate` uses — scripts/validate_run.py — so CI == local by
# construction (the registry is the single source of truth; CI can't drift).
#
# Most shards are a whole jobGroup (`--group X`). The `network` jobGroup is
# SUB-SHARDED across 3 parallel jobs via `--only` lists, because run serially it
# is ~14 networked games (~1s/choice) ≈ 2.5-3h on a 2-vCPU runner. The three
# --only lists union to EXACTLY the 14 network steps (no silent drop — coverage
# parity is preserved; see ai_docs/VALIDATE_OVERHAUL_AUDIT_20260603.md §10):
#   network-gui   : playwright-check, gui, multideck          (heavy soak games)
#   network-redo  : click, landing, redo-reload, redo-lobby, smoke, deploy-nav
#   network-equiv : equiv-random, equiv-zero, equiv-heuristic, robots42, fuzz
#                   (NATIVE — mtg server/connect only, no browser/wasm)
# `--only`/`--group` auto-pull a shard's deps (build-once mtg / the single wasm
# bundle), so each shard is self-contained; each runs on its own runner with its
# own target/ dir → per-shard build compiles in parallel, no cross-shard lock
# contention. Per-game speed on low-CPU is tracked separately (mtg-726).

jobs:
  validate:
    name: validate ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: lint,          args: "--group lint" }
          - { name: unit,          args: "--group unit",     nextest: true }
          - { name: examples,      args: "--group examples" }
          - { name: agentplay,     args: "--group agentplay", python: true }
          - { name: determ,        args: "--group determ" }
          - { name: wasm,          args: "--group wasm",      browser: true }
          - { name: network-gui,   args: "--only network.playwright-check,network.gui,network.multideck", browser: true }
          - { name: network-redo,  args: "--only network.click,network.landing,network.redo-reload,network.redo-lobby,network.smoke,network.deploy-nav", browser: true }
          - { name: network-equiv, args: "--only network.equiv-random,network.equiv-zero,network.equiv-heuristic,network.robots42,network.fuzz" }
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      # Materialize clippy/rustfmt SINGLE-THREADED before the parallel runner, so
      # concurrent lint steps don't race on rustup's shared ~/.rustup/downloads
      # (the "could not rename 'downloaded' file" failure).
      - name: Warm up toolchain components
        run: |
          rustup component add clippy rustfmt 2>/dev/null || true
          cargo clippy --version
          cargo fmt --version

      - name: Install nextest
        if: ${{ matrix.nextest }}
        uses: taiki-e/install-action@nextest

      - name: Set up Python
        if: ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        if: ${{ matrix.python }}
        run: pip install pytest

      - name: Set up Node.js
        if: ${{ matrix.browser }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install wasm-pack
        if: ${{ matrix.browser }}
        run: cargo install wasm-pack
      - name: Install Playwright + chromium
        if: ${{ matrix.browser }}
        run: cd web && npm install && npx playwright install chromium --with-deps

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.name }}-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Free runner disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost /opt/hostedtoolcache/CodeQL || true
          df -h

      # The shard. `--group`/`--only` runs the selected steps + their deps
      # (build-once mtg / wasm bundle) self-contained. -j defaults to nproc.
      # Per-step timeouts (validate_run.py): 600s tests / 2400s cold builds, so a
      # genuine hang FAILs the shard fast with a TIMEOUT marker.
      - name: Run validate (${{ matrix.name }})
        run: python3 scripts/validate_run.py ${{ matrix.args }}

      - name: Upload step logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-steps-${{ matrix.name }}
          path: validate_logs/steps_*/
          if-no-files-found: ignore
