[package]
name = "mtg-forge-rs"
version.workspace = true
edition.workspace = true

[[bin]]
name = "mtg"
path = "src/main.rs"

[lib]
name = "mtg_forge_rs"
path = "src/lib.rs"

[dependencies]
# Serialization
serde = { version = "1.0", features = ["derive", "rc"] }
serde_json = "1.0"
bincode = "1.3.3"
rkyv = { version = "0.7", features = ["validation"] }

# Collections
smallvec = { version = "1.11", features = ["serde", "union"] }
smallmap = { version = "1.4", features = ["serde"] }
bumpalo = { version = "3.16", features = ["collections", "allocator_api"] }
typed-arena = "2.0"
enumset = { version = "1.1", features = ["serde"] }

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Parsing
nom = "7.1"
deunicode = "1.6"  # Unicode to ASCII normalization for card names

# Random number generation
rand = { version = "0.8", features = ["serde1"] }
rand_chacha = { version = "0.3", features = ["serde1"] }
rand_xoshiro = { version = "0.6", features = ["serde1"] }

# Hashing (for fast lookups)
rustc-hash = "1.1"

# CLI argument parsing
clap = { version = "4.5", features = ["derive"] }

# TUI
ratatui = "0.28"
crossterm = "0.28"
signal-hook = "0.3"
libc = "0.2"  # For signal handling (raise)

# Async runtime
tokio = { version = "1.0", features = ["rt-multi-thread", "fs", "macros", "time", "sync"] }

# Parallel directory walking
jwalk = "0.8"

# Parallel execution
rayon = "1.10"
num_cpus = "1.16"

# High-performance allocator (mimalloc)
mimalloc = "0.1"

[dev-dependencies]
dir-test = "0.4"
similar-asserts = "1.5"
tempfile = "3.10.1"

[features]
# Enable verbose game event logging (format! allocations)
# Disable this feature for maximum performance in benchmarks
default = ["verbose-logging"]
verbose-logging = []
